<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="build-version" content="2026-06-26-ux-cache-1" />
  <title>Grow Presentation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1020;
      --panel: rgba(255, 255, 255, 0.94);
      --ink: #111827;
      --muted: #64748b;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --chrome: rgba(15, 23, 42, 0.76);
    }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 12% 0%, rgba(59, 130, 246, 0.24), transparent 34rem),
        radial-gradient(circle at 92% 12%, rgba(168, 85, 247, 0.18), transparent 28rem),
        var(--bg);
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
    }

    body.editor-open {
      overflow: auto;
    }

    button {
      font: inherit;
    }

    .deck {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: clamp(14px, 2vw, 28px);
    }

    body.editor-open .deck {
      display: none;
    }

    .slide {
      position: absolute;
      inset: clamp(14px, 2vw, 28px);
      display: grid;
      place-items: center;
      opacity: 0;
      transform: translateX(22px) scale(0.992);
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }

    .slider-slide main,
    .buttons-slide main {
      width: min(860px, 100%);
      background: var(--panel);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 30px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.32);
      padding: clamp(30px, 6vw, 64px);
      text-align: center;
      color: var(--ink);
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eff6ff;
      color: var(--blue-dark);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 720px;
      margin: 0 auto 34px;
      font-size: clamp(2rem, 5vw, 3.75rem);
      line-height: 1.04;
      letter-spacing: -0.05em;
      color: var(--ink);
    }

    .score-card {
      display: inline-grid;
      gap: 4px;
      min-width: 132px;
      margin-bottom: 34px;
      padding: 18px 28px;
      border-radius: 22px;
      background: #111827;
      color: white;
      box-shadow: 0 18px 32px rgba(17, 24, 39, 0.24);
    }

    .score-label {
      color: #cbd5e1;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .score-value {
      font-size: 4.4rem;
      line-height: 1;
      font-weight: 850;
      letter-spacing: -0.08em;
    }

    .slider-wrap {
      display: grid;
      gap: 16px;
      margin-top: 8px;
    }

    .button-choice-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 30px;
    }

    .choice-button {
      border: 1px solid rgba(37, 99, 235, 0.24);
      border-radius: 999px;
      padding: 14px 20px;
      background: #eff6ff;
      color: #1d4ed8;
      cursor: pointer;
      font: inherit;
      font-weight: 850;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.14);
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .choice-button[aria-pressed="true"] {
      background: #1d4ed8;
      color: white;
      transform: translateY(-1px);
    }

    .choice-button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.38);
      outline-offset: 3px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--blue);
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #dbeafe, var(--blue));
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 34px;
      height: 34px;
      margin-top: -11px;
      border: 4px solid white;
      border-radius: 50%;
      background: var(--blue-dark);
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.38);
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-moz-range-track {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #dbeafe, var(--blue));
    }

    input[type="range"]::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border: 4px solid white;
      border-radius: 50%;
      background: var(--blue-dark);
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.38);
    }

    .scale {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-weight: 850;
    }

    .helper-text {
      margin-top: 22px;
      color: #475569;
      font-size: 1.08rem;
    }

    .pdf-frame {
      width: min(100%, calc((100vh - 120px) * 16 / 9));
      max-height: calc(100vh - 92px);
      aspect-ratio: 16 / 9;
      display: grid;
      place-items: center;
      border-radius: 16px;
      overflow: hidden;
      background: #111827;
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.42);
    }

    .pdf-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #111827;
    }

    .media-frame {
      width: min(100%, calc((100vh - 120px) * 16 / 9));
      max-height: calc(100vh - 92px);
      aspect-ratio: 16 / 9;
      display: grid;
      place-items: center;
      border-radius: 16px;
      overflow: hidden;
      background: #111827;
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.42);
    }

    .media-frame img,
    .media-frame video,
    .media-frame iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      object-fit: contain;
      background: #111827;
    }

    .presentation-toolbar {
      position: fixed;
      z-index: 20;
      top: 18px;
      right: 18px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .toolbar-button,
    .editor-button {
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 850;
    }

    .toolbar-button,
    .editor-button {
      padding: 11px 16px;
      background: rgba(255, 255, 255, 0.94);
      color: #0f172a;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.22);
    }

    .toolbar-button:hover,
    .editor-button:hover,
    .toolbar-button:focus-visible,
    .editor-button:focus-visible {
      background: white;
      outline: 3px solid rgba(96, 165, 250, 0.55);
      outline-offset: 2px;
    }

    .editor-link,
    .editor-home-link {
      border: 0;
      border-radius: 999px;
      padding: 7px 11px;
      background: rgba(255, 255, 255, 0.08);
      color: #cbd5e1;
      cursor: pointer;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 750;
      text-decoration: none;
      box-shadow: none;
    }

    .editor-home-link {
      color: #93c5fd;
      background: rgba(96, 165, 250, 0.12);
    }

    .editor-link:hover,
    .editor-link:focus-visible,
    .editor-home-link:hover,
    .editor-home-link:focus-visible {
      background: rgba(255, 255, 255, 0.14);
      color: white;
      outline: 2px solid rgba(96, 165, 250, 0.45);
      outline-offset: 2px;
    }

    .presentation-editor {
      display: none;
      min-height: 100vh;
      padding: clamp(18px, 3vw, 36px);
      color: #e5e7eb;
    }

    body.editor-open .presentation-editor {
      display: block;
    }

    .editor-shell {
      width: min(1460px, 100%);
      margin: 0 auto;
    }

    .auth-panel {
      width: min(560px, 100%);
      margin: 16vh auto 0;
      display: grid;
      gap: 16px;
      padding: 30px;
      border: 1px solid rgba(226, 232, 240, 0.16);
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.9);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.32);
    }

    .auth-panel[hidden],
    .app-content[hidden] {
      display: none;
    }

    .auth-panel h2 {
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      line-height: 1;
      letter-spacing: -0.055em;
    }

    .auth-hint {
      color: #cbd5e1;
      font-weight: 700;
    }

    .auth-form {
      display: grid;
      gap: 10px;
      align-items: center;
    }

    .auth-form input {
      flex: 1;
      min-width: 0;
      border: 1px solid rgba(226, 232, 240, 0.18);
      border-radius: 999px;
      padding: 11px 14px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font: inherit;
      outline: none;
    }

    .auth-form input::placeholder {
      color: #94a3b8;
    }

    .auth-form input:focus {
      border-color: rgba(96, 165, 250, 0.64);
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.18);
    }

    .auth-actions {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      position: relative;
    }

    .library-title-link {
      display: inline-flex;
      color: inherit;
      text-decoration: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .library-title-link:hover,
    .library-title-link:focus-visible {
      color: white;
      outline: 2px solid rgba(96, 165, 250, 0.45);
      outline-offset: 4px;
    }

    .account-menu-button {
      width: 40px;
      height: 40px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(226, 232, 240, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 900;
    }

    .account-menu-button:hover,
    .account-menu-button:focus-visible {
      background: rgba(96, 165, 250, 0.24);
      outline: 2px solid rgba(96, 165, 250, 0.45);
      outline-offset: 2px;
    }

    .account-menu {
      position: absolute;
      z-index: 40;
      top: calc(100% + 8px);
      right: 0;
      min-width: 190px;
      display: grid;
      gap: 4px;
      padding: 8px;
      border: 1px solid rgba(226, 232, 240, 0.18);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.97);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.34);
    }

    .account-menu[hidden] {
      display: none;
    }

    .account-menu button {
      border: 0;
      border-radius: 11px;
      padding: 10px 12px;
      background: transparent;
      color: #e5e7eb;
      cursor: pointer;
      font: inherit;
      font-weight: 750;
      text-align: left;
    }

    .account-menu button:hover,
    .account-menu button:focus-visible {
      background: rgba(96, 165, 250, 0.18);
      color: white;
      outline: none;
    }

    .team-page {
      display: grid;
      gap: 18px;
      margin-top: 6px;
    }

    .team-page[hidden] {
      display: none;
    }

    .team-header {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .team-header h3 {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      letter-spacing: -0.04em;
    }

    .team-card {
      width: min(720px, 100%);
      display: grid;
      gap: 12px;
      padding: 18px;
      border: 1px solid rgba(226, 232, 240, 0.16);
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.56);
    }

    .team-list {
      display: grid;
      gap: 8px;
      width: min(720px, 100%);
    }

    .team-user-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(226, 232, 240, 0.14);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
    }

    .team-role {
      color: #bfdbfe;
      font-size: 0.85rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .editor-header {
      display: flex;
      gap: 18px;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 22px;
    }

    .editor-title-block {
      display: grid;
      gap: 8px;
      position: relative;
    }

    .editor-title-row {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      position: relative;
    }

    .library-header .editor-title-row {
      width: 100%;
      justify-content: space-between;
    }

    .add-menu-button {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(226, 232, 240, 0.18);
      border-radius: 999px;
      padding: 6px 12px 6px 8px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      cursor: pointer;
      font: inherit;
      font-size: 0.92rem;
      font-weight: 850;
      line-height: 1;
    }

    .add-menu-button span {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: rgba(96, 165, 250, 0.24);
      font-size: 1rem;
    }

    .add-menu-button:hover,
    .add-menu-button:focus-visible {
      background: rgba(96, 165, 250, 0.24);
      outline: 2px solid rgba(96, 165, 250, 0.45);
      outline-offset: 2px;
    }

    .add-menu {
      position: absolute;
      z-index: 30;
      top: calc(100% + 8px);
      left: 0;
      min-width: 170px;
      display: grid;
      gap: 4px;
      padding: 8px;
      border: 1px solid rgba(226, 232, 240, 0.18);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.96);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.34);
    }

    .add-menu[hidden] {
      display: none;
    }

    .add-menu-option {
      border: 0;
      border-radius: 10px;
      padding: 9px 11px;
      background: transparent;
      color: #e5e7eb;
      cursor: pointer;
      font: inherit;
      font-weight: 750;
      text-align: left;
    }

    .add-menu-option:hover,
    .add-menu-option:focus-visible {
      background: rgba(96, 165, 250, 0.18);
      color: white;
      outline: none;
    }

    .editor-title-block h2 {
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1;
      letter-spacing: -0.055em;
    }

    .editor-title-block p {
      max-width: 720px;
      color: #cbd5e1;
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .editor-status {
      min-height: 1.4em;
      margin-bottom: 18px;
      color: #bfdbfe;
      font-weight: 750;
    }

    .editor-kicker {
      display: inline-flex;
      color: #93c5fd;
      font-size: 0.78rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .presentation-manager {
      margin-top: 6px;
      overflow: visible;
    }

    .presentation-manager[hidden] {
      display: none;
    }

    .library-header {
      margin-bottom: 18px;
    }

    .library-header[hidden] {
      display: none;
    }

    .library-header .editor-title-row {
      width: 100%;
      justify-content: flex-start;
      gap: 14px;
    }

    .library-header .auth-actions {
      margin-left: auto;
    }

    .slideshow-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 220px));
      gap: 14px;
      align-items: start;
    }

    .slideshow-card {
      position: relative;
      border: 1px solid rgba(226, 232, 240, 0.16);
      border-radius: 18px;
      overflow: visible;
      background: rgba(15, 23, 42, 0.78);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.24);
    }

    .slideshow-card-main {
      width: 100%;
      display: grid;
      gap: 8px;
      border: 0;
      padding: 10px;
      background: transparent;
      color: white;
      cursor: pointer;
      text-align: left;
      font: inherit;
    }

    .slideshow-card-main:hover,
    .slideshow-card-main:focus-visible {
      outline: 2px solid rgba(96, 165, 250, 0.48);
      outline-offset: -2px;
      background: rgba(96, 165, 250, 0.1);
    }

    .slideshow-thumbnail {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 10px;
      overflow: hidden;
      background: #111827;
    }

    .slideshow-thumbnail img,
    .slideshow-thumbnail iframe,
    .slideshow-thumbnail video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      border: 0;
      background: #f8fafc;
    }

    .slideshow-title {
      min-height: 1.4em;
      padding: 0 2px 2px;
      font-size: 0.95rem;
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    .slideshow-menu-button {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.7);
      color: white;
      cursor: pointer;
      font: inherit;
      font-size: 1.2rem;
      font-weight: 900;
      line-height: 1;
    }

    .slideshow-menu {
      position: absolute;
      z-index: 40;
      top: calc(100% + 8px);
      right: 0;
      min-width: 132px;
      display: grid;
      gap: 4px;
      padding: 6px;
      border: 1px solid rgba(226, 232, 240, 0.18);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.98);
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.34);
    }

    .slideshow-menu[hidden] {
      display: none;
    }

    .slideshow-menu button {
      border: 0;
      border-radius: 9px;
      padding: 8px 10px;
      background: transparent;
      color: #e5e7eb;
      cursor: pointer;
      font: inherit;
      font-weight: 750;
      text-align: left;
    }

    .slideshow-menu button:hover,
    .slideshow-menu button:focus-visible {
      background: rgba(96, 165, 250, 0.18);
      color: white;
      outline: none;
    }

    .slideshow-menu button[data-presentation-action="delete"]:hover,
    .slideshow-menu button[data-presentation-action="delete"]:focus-visible {
      background: rgba(248, 113, 113, 0.2);
      color: #fecaca;
    }

    #editorWorkspace[hidden] {
      display: none;
    }

    #editorWorkspace {
      margin-top: 24px;
    }

    body.editing-slideshow .editor-status {
      display: none;
    }

    body.editing-slideshow #editorWorkspace {
      margin-top: 0;
    }

    .presentation-library-header {
      display: contents;
    }

    .library-layout {
      grid-template-columns: minmax(250px, 0.9fr) minmax(380px, 1.4fr);
      align-items: start;
    }

    .library-main {
      display: grid;
      gap: 12px;
    }

    .library-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-start;
    }

    .presentation-library-copy {
      display: grid;
      gap: 4px;
      max-width: 620px;
    }

    .presentation-library-copy h3 {
      color: white;
      font-size: clamp(1.25rem, 2.4vw, 1.8rem);
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .presentation-library-copy p {
      color: #94a3b8;
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .presentation-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 220px));
      gap: 14px;
    }

    .presentation-card {
      border: 1px solid rgba(226, 232, 240, 0.14);
      border-radius: 18px;
      padding: 13px;
      display: grid;
      align-content: space-between;
      gap: 10px;
      background: rgba(255, 255, 255, 0.045);
      color: #e5e7eb;
      cursor: pointer;
      font: inherit;
      text-align: left;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .presentation-card.active,
    .presentation-card:hover,
    .presentation-card:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(147, 197, 253, 0.46);
      background: rgba(96, 165, 250, 0.15);
      outline: none;
    }

    .presentation-card-title {
      color: white;
      font-size: 1.08rem;
      font-weight: 850;
      letter-spacing: -0.03em;
    }

    .presentation-card-meta {
      color: #94a3b8;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .presentation-card-status {
      justify-self: flex-start;

    function buildSlideElement(definition, index) {
      const section = document.createElement('section');
      section.className = `slide ${definition.kind === 'custom-slider' ? 'slider-slide' : definition.kind === 'custom-buttons' ? 'buttons-slide' : 'pdf-slide'}`;
      section.dataset.slideId = definition.id;
      section.dataset.title = definition.title || `Slide ${index + 1}`;

      if (definition.kind === 'image') {
        section.innerHTML = `
          <figure class="pdf-frame">
            <img src="assets/slides/${definition.file}" alt="Webinar slide ${index + 1}" loading="lazy" decoding="async" />
          </figure>
        `;
      }

      if (definition.kind === 'custom-slider') {
        const scoreId = `score-${definition.id}`;
        const inputId = `input-${definition.id}`;
        const helperId = `helper-${definition.id}`;
        section.innerHTML = `
          <main>
            <div class="eyebrow">Self-assessment</div>
            <h1>${definition.question}</h1>
            <section class="score-card" aria-live="polite">
              <span class="score-label">Your score</span>
              <span id="${scoreId}" class="score-value">${definition.value}</span>
            </section>
            <div class="slider-wrap">
              <label class="sr-only" for="${inputId}">${definition.question}</label>
              <input id="${inputId}" type="range" min="${definition.min}" max="${definition.max}" step="1" value="${definition.value}" />
              <div class="scale" aria-hidden="true"><span>${definition.min}</span><span>${definition.max}</span></div>
            </div>
            <p class="helper-text" id="${helperId}">${definition.labels?.[definition.value] || ''}</p>
          </main>
        `;
        const input = section.querySelector(`#${inputId}`);
        const score = section.querySelector(`#${scoreId}`);
        const helper = section.querySelector(`#${helperId}`);
        input.addEventListener('input', () => {
          score.textContent = input.value;
          helper.textContent = definition.labels?.[input.value] || '';
        });
      }

      if (definition.kind === 'custom-buttons') {
        const buttonChoices = (definition.choices || []).map(normalizeButtonChoice);
        section.innerHTML = `
          <main>
            <div class="eyebrow">Choose all that apply</div>
            <h1>${escapeAttribute(definition.question)}</h1>
            <div class="button-choice-grid">
              ${buttonChoices.map((choice, choiceIndex) => `
                <button class="choice-button" type="button" aria-pressed="false" data-choice-index="${choiceIndex}" data-target-slide-id="${escapeAttribute(choice.targetSlideId || '')}" data-branch-id="${escapeAttribute(choice.branchId || '')}" data-branch-name="${escapeAttribute(choice.branchName || '')}">${escapeAttribute(choice.label)}</button>
              `).join('')}
            </div>
          </main>
        `;
        section.querySelectorAll('.choice-button').forEach((button) => {
          button.addEventListener('click', () => {
            const nextPressed = button.getAttribute('aria-pressed') !== 'true';
            const targetSlideId = button.dataset.targetSlideId;
            button.setAttribute('aria-pressed', nextPressed ? 'true' : 'false');
            if (targetSlideId) goToSlideId(targetSlideId);
          });
        });
      }

      if (definition.kind === 'media-image') {
        section.innerHTML = `
          <figure class="media-frame">
            <img src="${definition.dataUrl}" alt="${definition.title}" loading="lazy" decoding="async" />
          </figure>
        `;
      }

      if (definition.kind === 'media-video') {
        section.innerHTML = `
          <figure class="media-frame">
            <video src="${definition.dataUrl}" controls playsinline></video>
          </figure>
        `;
      }

      if (definition.kind === 'media-pdf' || definition.kind === 'media-embed') {
        section.innerHTML = `
          <figure class="media-frame">
            <iframe src="${definition.dataUrl}" title="${definition.title}"></iframe>
          </figure>
        `;
      }

      return section;
    }

    function renderDeckSlides() {
      deck.innerHTML = '';
      slideElementsById.clear();
      slideDefinitions.forEach((definition, index) => {
        const section = buildSlideElement(definition, index);
        deck.appendChild(section);
        slideElementsById.set(section.dataset.slideId, section);
      });
    }

    function saveCustomSlides() {
      activePresentation.customSlides = customSlides;
      saveActivePresentation();
    }

    function saveDeletedSlideIds() {
      activePresentation.deletedSlideIds = deletedSlideIds;
      saveActivePresentation();
    }

    function normalizeSlideOrder(savedOrder, availableIds = defaultSlideOrder) {
      const savedIds = Array.isArray(savedOrder) ? savedOrder.filter((id) => availableIds.includes(id)) : [];
      return [
        ...savedIds,
        ...availableIds.filter((id) => !savedIds.includes(id))
      ];
    }

    function createPresentationRecord(id, title, overrides = {}) {
      return {
        id,
        title,
        customSlides: overrides.customSlides || [],
        deletedSlideIds: overrides.deletedSlideIds || [],
        slideOrder: overrides.slideOrder || baseSlideDefinitions.map((slide) => slide.id)
      };
    }

    const FALLBACK_PRESENTATIONS = [];

    function normalizePresentationRecord(presentation) {
      return createPresentationRecord(presentation.id, presentation.title, {
        customSlides: Array.isArray(presentation.customSlides) ? presentation.customSlides : [],
        deletedSlideIds: Array.isArray(presentation.deletedSlideIds) ? presentation.deletedSlideIds : [],
        slideOrder: Array.isArray(presentation.slideOrder) ? presentation.slideOrder : baseSlideDefinitions.map((slide) => slide.id)
      });
    }

    async function requestJson(url, path = '', options = {}) {
      const response = await fetch(url + path, {
        ...options,
        cache: 'no-store',
        credentials: 'include',
        headers: {
          'content-type': 'application/json',
          ...(authToken ? { 'Authorization': `Bearer ${authToken}` } : {}),
          ...(options.headers || {})
        }
      });
      if (!response.ok) {
        const error = new Error(`API returned ${response.status}`);
        error.status = response.status;
        throw error;
      }
      return response.json();
    }

    async function authRequest(path = '', options = {}) {
      return requestJson(AUTH_API_URL, path, options);
    }

    async function apiRequest(path = '', options = {}) {
      return requestJson(PRESENTATION_API_URL, path, options);
    }

    function storeAuthToken(sessionToken = '') {
      authToken = sessionToken || '';
      if (authToken) localStorage.setItem(AUTH_TOKEN_STORAGE_KEY, authToken);
    }

    function clearAuthToken() {
      authToken = '';
      localStorage.removeItem(AUTH_TOKEN_STORAGE_KEY);
    }

    async function requireSession() {
      try {
        const data = await authRequest('/session');
        if (!data.user) {
          currentUser = null;
          showLoginPanel();
          return false;
        }
        currentUser = data.user;
        showAuthenticatedChrome();
        return true;
      } catch (error) {
        currentUser = null;
        showLoginPanel();
        return false;
      }
    }

    function showAuthenticatedChrome() {
      loginPanel.hidden = true;
      resetPasswordPanel.hidden = true;
      appContent.hidden = false;
      teamMenuButton.hidden = !isOwnerUser(currentUser);
      signOutButton.hidden = false;
      if (loginStatus) loginStatus.textContent = '';
    }

    function showLoginPanel(message = '') {
      document.body.classList.add('editor-open', 'library-mode');
      editor.setAttribute('aria-hidden', 'false');
      appContent.hidden = true;
      resetPasswordPanel.hidden = true;
      loginPanel.hidden = false;
      openEditorButton.hidden = true;
      if (loginStatus) loginStatus.textContent = message;
      loginEmailInput?.focus();
    }

    function showResetPasswordPanel(message = '') {
      document.body.classList.add('editor-open', 'library-mode');
      editor.setAttribute('aria-hidden', 'false');
      appContent.hidden = true;
      loginPanel.hidden = true;
      resetPasswordPanel.hidden = false;
      openEditorButton.hidden = true;
      if (resetPasswordStatus) resetPasswordStatus.textContent = message;
      resetPasswordInput?.focus();
    }

    function getResetTokenFromUrl() {
      return new URLSearchParams(window.location.search).get('reset') || '';
    }

    async function loginWithPassword(email, password) {
      try {
        const data = await authRequest('/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        storeAuthToken(data.sessionToken);
        currentUser = data.user;
        showAuthenticatedChrome();
        return true;
      } catch (error) {
        showLoginPanel('Invalid email or password.');
        return false;
      }
    }

    async function requestPasswordReset(email) {
      const trimmed = String(email || '').trim();
      if (!trimmed) {
        showLoginPanel('Enter your email first, then choose Forgot password.');
        return;
      }
      try {
        await authRequest('/request-password-reset', {
          method: 'POST',
          body: JSON.stringify({ email: trimmed })
        });
        showLoginPanel('If that account exists, a reset link has been sent.');
      } catch (error) {
        showLoginPanel('Could not start password reset. Try again in a moment.');
      }
    }

    async function resetPassword(token, password) {
      try {
        const data = await authRequest('/reset-password', {
          method: 'POST',
          body: JSON.stringify({ token, password })
        });
        storeAuthToken(data.sessionToken);
        currentUser = data.user;
        history.replaceState(history.state, '', '/');
        showAuthenticatedChrome();
        await initializePresentations();
      } catch (error) {
        showResetPasswordPanel(error.status === 400 ? 'Password must be at least 10 characters.' : 'That reset link is invalid or expired.');
      }
    }

    function isOwnerUser(user) {
      const email = String(user?.email || '').toLowerCase();
      return email === 'kenny@stuffyoucanuse.org' || email === 'kenny@growpage.org';
    }

    function toggleAccountMenu(forceOpen) {
      const shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : accountMenu.hidden;
      accountMenu.hidden = !shouldOpen;
      accountMenuButton.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
    }

    function renderTeamUsers(users = []) {
      teamList.innerHTML = users.map((user) => `
        <article class="team-user-row">
          <span>${escapeAttribute(user.email)}</span>
          <span class="team-role">${escapeAttribute(user.role || 'user')}</span>
        </article>

      toggleAccountMenu(false);
      libraryHeader.hidden = true;
      presentationManager.hidden = true;

      editorWorkspace.hidden = true;

      libraryHeader.hidden = false;
      teamPage.hidden = true;
      presentationManager.hidden = false;
      editorWorkspace.hidden = true;
      renderPresentationManager();
