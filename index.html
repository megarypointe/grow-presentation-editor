<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grow Presentation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1020;
      --panel: rgba(255, 255, 255, 0.94);
      --ink: #111827;
      --muted: #64748b;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --chrome: rgba(15, 23, 42, 0.76);
    }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 12% 0%, rgba(59, 130, 246, 0.24), transparent 34rem),
        radial-gradient(circle at 92% 12%, rgba(168, 85, 247, 0.18), transparent 28rem),
        var(--bg);
    }

    body.editor-open {
      overflow: auto;
    }

    button {
      font: inherit;
    }

    .deck {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: clamp(14px, 2vw, 28px);
    }

    body.editor-open .deck {
      display: none;
    }

    .slide {
      position: absolute;
      inset: clamp(14px, 2vw, 28px);
      display: grid;
      place-items: center;
      opacity: 0;
      transform: translateX(22px) scale(0.992);
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }

    .slider-slide main {
      width: min(860px, 100%);
      background: var(--panel);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 30px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.32);
      padding: clamp(30px, 6vw, 64px);
      text-align: center;
      color: var(--ink);
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eff6ff;
      color: var(--blue-dark);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 720px;
      margin: 0 auto 34px;
      font-size: clamp(2rem, 5vw, 3.75rem);
      line-height: 1.04;
      letter-spacing: -0.05em;
      color: var(--ink);
    }

    .score-card {
      display: inline-grid;
      gap: 4px;
      min-width: 132px;
      margin-bottom: 34px;
      padding: 18px 28px;
      border-radius: 22px;
      background: #111827;
      color: white;
      box-shadow: 0 18px 32px rgba(17, 24, 39, 0.24);
    }

    .score-label {
      color: #cbd5e1;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #scoreValue {
      font-size: 4.4rem;
      line-height: 1;
      font-weight: 850;
      letter-spacing: -0.08em;
    }

    .slider-wrap {
      display: grid;
      gap: 16px;
      margin-top: 8px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--blue);
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #dbeafe, var(--blue));
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 34px;
      height: 34px;
      margin-top: -11px;
      border: 4px solid white;
      border-radius: 50%;
      background: var(--blue-dark);
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.38);
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-moz-range-track {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #dbeafe, var(--blue));
    }

    input[type="range"]::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border: 4px solid white;
      border-radius: 50%;
      background: var(--blue-dark);
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.38);
    }

    .scale {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-weight: 850;
    }

    .helper-text {
      margin-top: 22px;
      color: #475569;
      font-size: 1.08rem;
    }

    .pdf-frame {
      width: min(100%, calc((100vh - 120px) * 16 / 9));
      max-height: calc(100vh - 92px);
      aspect-ratio: 16 / 9;
      display: grid;
      place-items: center;
      border-radius: 16px;
      overflow: hidden;
      background: #111827;
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.42);
    }

    .pdf-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #111827;
    }

    .media-frame {
      width: min(100%, calc((100vh - 120px) * 16 / 9));
      max-height: calc(100vh - 92px);
      aspect-ratio: 16 / 9;
      display: grid;
      place-items: center;
      border-radius: 16px;
      overflow: hidden;
      background: #111827;
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.42);
    }

    .media-frame img,
    .media-frame video,
    .media-frame iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      object-fit: contain;
      background: #111827;
    }

    .presentation-toolbar {
      position: fixed;
      z-index: 20;
      top: 18px;
      right: 18px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .toolbar-button,
    .editor-button {
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 850;
    }

    .toolbar-button,
    .editor-button {
      padding: 11px 16px;
      background: rgba(255, 255, 255, 0.94);
      color: #0f172a;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.22);
    }

    .toolbar-button:hover,
    .editor-button:hover,
    .toolbar-button:focus-visible,
    .editor-button:focus-visible {
      background: white;
      outline: 3px solid rgba(96, 165, 250, 0.55);
      outline-offset: 2px;
    }

    .editor-link {
      border: 0;
      border-radius: 999px;
      padding: 7px 11px;
      background: rgba(255, 255, 255, 0.08);
      color: #cbd5e1;
      cursor: pointer;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 750;
      text-decoration: none;
      box-shadow: none;
    }

    .editor-link:hover,
    .editor-link:focus-visible {
      background: rgba(255, 255, 255, 0.14);
      color: white;
      outline: 2px solid rgba(96, 165, 250, 0.45);
      outline-offset: 2px;
    }

    .presentation-editor {
      display: none;
      min-height: 100vh;
      padding: clamp(18px, 3vw, 36px);
      color: #e5e7eb;
    }

    body.editor-open .presentation-editor {
      display: block;
    }

    .editor-shell {
      width: min(1460px, 100%);
      margin: 0 auto;
    }

    .editor-header {
      display: flex;
      gap: 18px;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 22px;
    }

    .editor-title-block {
      display: grid;
      gap: 8px;
      position: relative;
    }

    .editor-title-row {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      position: relative;
    }

    .add-menu-button {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(226, 232, 240, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      cursor: pointer;
      font: inherit;
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1;
    }

    .add-menu-button:hover,
    .add-menu-button:focus-visible {
      background: rgba(96, 165, 250, 0.24);
      outline: 2px solid rgba(96, 165, 250, 0.45);
      outline-offset: 2px;
    }

    .add-menu {
      position: absolute;
      z-index: 30;
      top: calc(100% + 8px);
      left: 0;
      min-width: 170px;
      display: grid;
      gap: 4px;
      padding: 8px;
      border: 1px solid rgba(226, 232, 240, 0.18);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.96);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.34);
    }

    .add-menu[hidden] {
      display: none;
    }

    .add-menu-option {
      border: 0;
      border-radius: 10px;
      padding: 9px 11px;
      background: transparent;
      color: #e5e7eb;
      cursor: pointer;
      font: inherit;
      font-weight: 750;
      text-align: left;
    }

    .add-menu-option:hover,
    .add-menu-option:focus-visible {
      background: rgba(96, 165, 250, 0.18);
      color: white;
      outline: none;
    }

    .editor-title-block h2 {
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1;
      letter-spacing: -0.055em;
    }

    .editor-title-block p {
      max-width: 720px;
      color: #cbd5e1;
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .editor-status {
      min-height: 1.4em;
      margin-bottom: 18px;
      color: #bfdbfe;
      font-weight: 750;
    }

    .editor-tools {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      margin: 0 0 18px;
    }

    .editor-tool {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid rgba(226, 232, 240, 0.16);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.52);
    }

    .tool-panel[hidden] {
      display: none;
    }

    .editor-tool h3 {
      color: white;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .tool-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tool-row input,
    .tool-row select,
    .editor-tool input[type="text"],
    .editor-tool input[type="file"] {
      min-width: 0;
      width: 100%;
      border: 1px solid rgba(226, 232, 240, 0.18);
      border-radius: 12px;
      padding: 9px 10px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font: inherit;
    }

    .editor-tool input::placeholder {
      color: #94a3b8;
    }

    .tool-row input[type="number"] {
      width: 74px;
      flex: 0 0 74px;
    }

    .tool-button {
      border: 0;
      border-radius: 999px;
      padding: 9px 13px;
      background: rgba(96, 165, 250, 0.22);
      color: #dbeafe;
      cursor: pointer;
      font: inherit;
      font-weight: 850;
      white-space: nowrap;
    }

    .tool-button:hover,
    .tool-button:focus-visible {
      background: rgba(96, 165, 250, 0.34);
      color: white;
      outline: 2px solid rgba(96, 165, 250, 0.45);
      outline-offset: 2px;
    }

    .editor-grid {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      padding-bottom: 32px;
    }

    .slide-card {
      flex: 0 0 220px;
      width: 220px;
      display: grid;
      margin: 8px;
      padding: 12px;
      border: 1px solid rgba(226, 232, 240, 0.2);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.78);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.24);
      cursor: grab;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .slide-card:active {
      cursor: grabbing;
    }

    .slide-card.dragging {
      opacity: 0.55;
      transform: scale(0.985);
    }

    .drop-indicator {
      flex: 0 0 16px;
      min-height: 132px;
      align-self: stretch;
      display: grid;
      place-items: center;
      margin: 8px -8px;
      border-radius: 999px;
      opacity: 0.35;
      pointer-events: auto;
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .drop-indicator::before {
      content: '';
      width: 4px;
      height: 100%;
      min-height: 120px;
      border-radius: 999px;
      background: transparent;
      box-shadow: none;
      transition: background 140ms ease, box-shadow 140ms ease, width 140ms ease;
    }

    .drop-indicator.active {
      opacity: 1;
      transform: scaleX(1.35);
    }

    .drop-indicator.active::before {
      width: 6px;
      background: #60a5fa;
      box-shadow: 0 0 0 6px rgba(96, 165, 250, 0.24), 0 0 24px rgba(96, 165, 250, 0.7);
    }

    .slide-card-preview {
      aspect-ratio: 16 / 9;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 12px;
      background: #111827;
    }

    .slide-card-preview img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .slide-card-placeholder {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 18px;
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      color: var(--blue-dark);
      text-align: center;
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -0.035em;
    }

    @media (max-width: 760px) {
      .slide { inset: 12px; }
      .pdf-frame { width: calc(100vw - 28px); max-height: calc(100vh - 104px); }
      .presentation-toolbar { top: 10px; right: 10px; }
      .toolbar-button { padding: 9px 12px; font-size: 0.9rem; }
      .editor-header { display: grid; }
      .editor-actions { justify-content: flex-start; }
      .slide-card { flex: 0 0 150px; width: 150px; margin: 6px; padding: 9px; }
      .drop-indicator { flex-basis: 14px; min-height: 99px; margin: 6px -7px; }
    }
  </style>
</head>
<body class="editor-open">
  <div class="presentation-toolbar" aria-label="Presentation tools">
    <button class="toolbar-button" id="openEditorButton" type="button" hidden>Presentation Editor</button>
  </div>

  <div class="deck" id="deck" aria-live="polite">
    <section class="slide slider-slide active" data-slide-id="strategy-slider" data-title="Discipleship Strategy Slider">
      <main>
        <div class="eyebrow">Self-assessment</div>
        <h1>How strong do you feel your Discipleship strategy is?</h1>

        <section class="score-card" aria-live="polite">
          <span class="score-label">Your score</span>
          <span id="scoreValue">3</span>
        </section>

        <div class="slider-wrap">
          <label class="sr-only" for="discipleshipScore">Discipleship strategy strength from 1 to 5</label>
          <input id="discipleshipScore" type="range" min="1" max="5" step="1" value="3" />
          <div class="scale" aria-hidden="true">
            <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
          </div>
        </div>

        <p class="helper-text" id="helperText">Move the slider to rate your current strategy.</p>
      </main>
    </section>
  </div>

  <section class="presentation-editor" id="presentationEditor" aria-label="Presentation Editor" aria-hidden="false">
    <div class="editor-shell">
      <header class="editor-header">
        <div class="editor-title-block">
          <div class="editor-title-row">
            <h2>Presentation Editor</h2>
            <button id="addMenuButton" class="add-menu-button" type="button" aria-label="Add slide" aria-expanded="false" aria-controls="addMenu">+</button>
            <div class="add-menu" id="addMenu" hidden>
              <button class="add-menu-option" type="button" data-tool="slider">Add Slider</button>
              <button class="add-menu-option" type="button" data-tool="media">Add Slide</button>
            </div>
          </div>
        </div>
        <div class="editor-actions">
          <button id="exitEditorButton" class="editor-link" type="button">Open Presentation</button>
        </div>
      </header>
      <p class="editor-status" id="editorStatus" aria-live="polite"></p>
      <div class="editor-tools" aria-label="Add slides">
        <form class="editor-tool tool-panel" id="addSliderForm" hidden>
          <h3>Add slider question</h3>
          <input id="sliderQuestionInput" type="text" placeholder="Question for the slide" required />
          <div class="tool-row">
            <input id="sliderMinInput" type="number" value="1" min="0" aria-label="Minimum slider value" />
            <input id="sliderMaxInput" type="number" value="5" min="1" aria-label="Maximum slider value" />
            <button class="tool-button" type="submit">Add Slider</button>
          </div>
        </form>
        <form class="editor-tool tool-panel" id="addMediaForm" hidden>
          <h3>Add media slide</h3>
          <div class="tool-row">
            <select id="mediaTypeSelect" aria-label="Media slide type">
              <option value="image">Image</option>
              <option value="video">Video</option>
              <option value="pdf">PDF</option>
            </select>
            <button class="tool-button" type="submit">Add Slide</button>
          </div>
          <input id="mediaFileInput" type="file" accept="image/*,video/*,application/pdf" required />
        </form>
      </div>
      <div class="editor-grid" id="editorGrid" aria-label="Slides in presentation order"></div>
    </div>
  </section>

  <script>
    const ORDER_STORAGE_KEY = 'discipleshipPresentationSlideOrder';
    const CUSTOM_SLIDES_STORAGE_KEY = 'discipleshipPresentationCustomSlides';

    const pdfSlides = [
      "page-003.webp", "page-004.webp", "page-005.webp",
      "page-006.webp", "page-007.webp", "page-008.webp", "page-009.webp", "page-010.webp",
      "page-011.webp", "page-012.webp", "page-013.webp", "page-014.webp", "page-015.webp",
      "page-016.webp", "page-017.webp", "page-018.webp", "page-019.webp", "page-020.webp",
      "page-021.webp", "page-022.webp", "page-023.webp", "page-024.webp", "page-025.webp",
      "page-026.webp", "page-027.webp", "page-028.webp", "page-029.webp", "page-030.webp",
      "page-031.webp", "page-032.webp", "page-033.webp", "page-034.webp"
    ];

    const baseSlideDefinitions = [
      {
        id: 'strategy-slider',
        title: 'Discipleship Strategy Slider',
        kind: 'custom'
      },
      ...pdfSlides.map((file, index) => ({
        id: `pdf-${index + 1}`,
        title: `PDF slide ${index + 1}`,
        file,
        kind: 'image'
      }))
    ];

    let customSlides = loadCustomSlides();
    let slideDefinitions = [...baseSlideDefinitions, ...customSlides];

    const deck = document.querySelector('#deck');
    const editor = document.querySelector('#presentationEditor');
    const editorGrid = document.querySelector('#editorGrid');
    const editorStatus = document.querySelector('#editorStatus');
    const openEditorButton = document.querySelector('#openEditorButton');
    const exitEditorButton = document.querySelector('#exitEditorButton');
    const addMenuButton = document.querySelector('#addMenuButton');
    const addMenu = document.querySelector('#addMenu');
    const addMenuOptions = document.querySelectorAll('[data-tool]');
    const addSliderForm = document.querySelector('#addSliderForm');
    const sliderQuestionInput = document.querySelector('#sliderQuestionInput');
    const sliderMinInput = document.querySelector('#sliderMinInput');
    const sliderMaxInput = document.querySelector('#sliderMaxInput');
    const addMediaForm = document.querySelector('#addMediaForm');
    const mediaTypeSelect = document.querySelector('#mediaTypeSelect');
    const mediaFileInput = document.querySelector('#mediaFileInput');
    let defaultSlideOrder = slideDefinitions.map((slide) => slide.id);
    const slideElementsById = new Map();
    let slideOrder = loadSlideOrder();
    let slides = [];
    let currentSlide = 0;
    let draggedSlideId = null;

    slideElementsById.set('strategy-slider', document.querySelector('[data-slide-id="strategy-slider"]'));

    function buildSlideElement(definition, index) {
      const section = document.createElement('section');
      section.className = `slide ${definition.kind === 'custom-slider' ? 'slider-slide' : 'pdf-slide'}`;
      section.dataset.slideId = definition.id;
      section.dataset.title = definition.title || `Slide ${index + 1}`;

      if (definition.kind === 'image') {
        section.innerHTML = `
          <figure class="pdf-frame">
            <img src="assets/slides/${definition.file}" alt="Webinar slide ${index + 1}" loading="lazy" decoding="async" />
          </figure>
        `;
      }

      if (definition.kind === 'custom-slider') {
        const scoreId = `score-${definition.id}`;
        const inputId = `input-${definition.id}`;
        section.innerHTML = `
          <main>
            <div class="eyebrow">Self-assessment</div>
            <h1>${definition.question}</h1>
            <section class="score-card" aria-live="polite">
              <span class="score-label">Your score</span>
              <span id="${scoreId}">${definition.value}</span>
            </section>
            <div class="slider-wrap">
              <label class="sr-only" for="${inputId}">${definition.question}</label>
              <input id="${inputId}" type="range" min="${definition.min}" max="${definition.max}" step="1" value="${definition.value}" />
              <div class="scale" aria-hidden="true"><span>${definition.min}</span><span>${definition.max}</span></div>
            </div>
          </main>
        `;
        const input = section.querySelector(`#${inputId}`);
        const score = section.querySelector(`#${scoreId}`);
        input.addEventListener('input', () => { score.textContent = input.value; });
      }

      if (definition.kind === 'media-image') {
        section.innerHTML = `
          <figure class="media-frame">
            <img src="${definition.dataUrl}" alt="${definition.title}" loading="lazy" decoding="async" />
          </figure>
        `;
      }

      if (definition.kind === 'media-video') {
        section.innerHTML = `
          <figure class="media-frame">
            <video src="${definition.dataUrl}" controls playsinline></video>
          </figure>
        `;
      }

      if (definition.kind === 'media-pdf') {
        section.innerHTML = `
          <figure class="media-frame">
            <iframe src="${definition.dataUrl}" title="${definition.title} application/pdf"></iframe>
          </figure>
        `;
      }

      return section;
    }

    slideDefinitions.forEach((definition, index) => {
      if (definition.id === 'strategy-slider') return;
      const section = buildSlideElement(definition, index);
      deck.appendChild(section);
      slideElementsById.set(section.dataset.slideId, section);
    });

    function loadCustomSlides() {
      try {
        const savedSlides = JSON.parse(localStorage.getItem(CUSTOM_SLIDES_STORAGE_KEY) || '[]');
        if (!Array.isArray(savedSlides)) return [];
        return savedSlides.filter((slide) => slide && slide.id && [
          'custom-slider', 'media-image', 'media-video', 'media-pdf'
        ].includes(slide.kind));
      } catch (error) {
        return [];
      }
    }

    function saveCustomSlides() {
      localStorage.setItem(CUSTOM_SLIDES_STORAGE_KEY, JSON.stringify(customSlides));
    }

    function registerCustomSlide(definition) {
      customSlides.push(definition);
      slideDefinitions = [...baseSlideDefinitions, ...customSlides];
      defaultSlideOrder = slideDefinitions.map((slide) => slide.id);
      saveCustomSlides();
      slideElementsById.set(definition.id, buildSlideElement(definition, slideDefinitions.length - 1));
      slideOrder.push(definition.id);
      persistSlideOrder();
      applySlideOrder(definition.id);
      renderEditorCards();
    }

    function createSliderSlide(question, min, max) {
      const safeMin = Number.isFinite(min) ? min : 1;
      const safeMax = Number.isFinite(max) && max > safeMin ? max : safeMin + 4;
      const definition = {
        id: `custom-slider-${Date.now()}`,
        title: question,
        question,
        min: safeMin,
        max: safeMax,
        value: Math.round((safeMin + safeMax) / 2),
        kind: 'custom-slider'
      };
      registerCustomSlide(definition);
    }

    function createMediaSlide(mediaType, file) {
      const reader = new FileReader();
      reader.addEventListener('load', () => {
        const definition = {
          id: `media-${mediaType}-${Date.now()}`,
          title: file.name || `${mediaType} slide`,
          kind: `media-${mediaType}`,
          mimeType: file.type,
          dataUrl: reader.result
        };
        try {
          registerCustomSlide(definition);
        } catch (error) {
          editorStatus.textContent = 'That file is too large to save in this browser. Try a smaller file.';
        }
      });
      reader.readAsDataURL(file);
    }

    function loadSlideOrder() {
      try {
        const savedOrder = JSON.parse(localStorage.getItem(ORDER_STORAGE_KEY) || '[]');
        const savedIds = Array.isArray(savedOrder) ? savedOrder.filter((id) => defaultSlideOrder.includes(id)) : [];
        return [
          ...savedIds,
          ...defaultSlideOrder.filter((id) => !savedIds.includes(id))
        ];
      } catch (error) {
        return [...defaultSlideOrder];
      }
    }

    function persistSlideOrder() {
      localStorage.setItem(ORDER_STORAGE_KEY, JSON.stringify(slideOrder));
      editorStatus.textContent = `Saved order for ${slideOrder.length} slides.`;
    }

    function applySlideOrder(keepCurrentSlideId = slideOrder[currentSlide]) {
      slideOrder.forEach((slideId) => {
        deck.appendChild(slideElementsById.get(slideId));
      });
      slides = slideOrder.map((slideId) => slideElementsById.get(slideId));
      const newCurrentIndex = slideOrder.indexOf(keepCurrentSlideId);
      currentSlide = newCurrentIndex >= 0 ? newCurrentIndex : Math.min(currentSlide, slides.length - 1);
      updateDeck();
    }

    function renderDropIndicators(dropIndex) {
      const indicator = document.createElement('div');
      indicator.className = 'drop-indicator';
      indicator.dataset.dropIndex = dropIndex;
      indicator.setAttribute('aria-hidden', 'true');

      indicator.addEventListener('dragover', (event) => {
        event.preventDefault();
        event.dataTransfer.dropEffect = 'move';
        setActiveDropIndicator(dropIndex);
      });

      indicator.addEventListener('drop', (event) => {
        event.preventDefault();
        const droppedSlideId = event.dataTransfer.getData('text/plain') || draggedSlideId;
        if (droppedSlideId) {
          moveSlide(droppedSlideId, dropIndex);
        }
      });

      return indicator;
    }

    function setActiveDropIndicator(dropIndex) {
      editorGrid.querySelectorAll('.drop-indicator').forEach((indicator) => {
        indicator.classList.toggle('active', Number(indicator.dataset.dropIndex) === dropIndex);
      });
    }

    function clearActiveDropIndicator() {
      editorGrid.querySelectorAll('.drop-indicator.active').forEach((indicator) => {
        indicator.classList.remove('active');
      });
    }

    function getDropIndexFromPointer(card, event, cardIndex) {
      const rect = card.getBoundingClientRect();
      const isAfterCardMidpoint = event.clientX > rect.left + rect.width / 2;
      return cardIndex + (isAfterCardMidpoint ? 1 : 0);
    }

    function renderEditorCards() {
      editorGrid.innerHTML = '';
      slideOrder.forEach((slideId, index) => {
        editorGrid.appendChild(renderDropIndicators(index));
        const definition = slideDefinitions.find((slide) => slide.id === slideId);
        const card = document.createElement('article');
        card.className = 'slide-card';
        card.draggable = true;
        card.setAttribute('draggable', 'true');
        card.dataset.slideId = slideId;
        card.innerHTML = `
          <div class="slide-card-preview">
            ${definition.kind === 'image'
              ? `<img src="assets/slides/${definition.file}" alt="${definition.title} thumbnail" loading="lazy" decoding="async" />`
              : definition.kind === 'media-image'
                ? `<img src="${definition.dataUrl}" alt="${definition.title} thumbnail" loading="lazy" decoding="async" />`
                : definition.kind === 'media-video'
                  ? '<div class="slide-card-placeholder">Video</div>'
                  : definition.kind === 'media-pdf'
                    ? '<div class="slide-card-placeholder">PDF</div>'
                    : '<div class="slide-card-placeholder">Slider</div>'}
          </div>
        `;

        card.addEventListener('dragstart', (event) => {
          draggedSlideId = slideId;
          card.classList.add('dragging');
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', slideId);
        });

        card.addEventListener('dragend', () => {
          draggedSlideId = null;
          card.classList.remove('dragging');
          clearActiveDropIndicator();
        });

        card.addEventListener('dragover', (event) => {
          event.preventDefault();
          event.dataTransfer.dropEffect = 'move';
          setActiveDropIndicator(getDropIndexFromPointer(card, event, index));
        });

        card.addEventListener('drop', (event) => {
          event.preventDefault();
          const droppedSlideId = event.dataTransfer.getData('text/plain') || draggedSlideId;
          if (droppedSlideId) {
            moveSlide(droppedSlideId, getDropIndexFromPointer(card, event, index));
          }
        });

        editorGrid.appendChild(card);
      });
      editorGrid.appendChild(renderDropIndicators(slideOrder.length));
    }

    function moveSlide(slideId, targetIndex) {
      const fromIndex = slideOrder.indexOf(slideId);
      if (fromIndex < 0 || targetIndex < 0 || targetIndex >= slideOrder.length || fromIndex === targetIndex) {
        return;
      }

      const adjustedTargetIndex = fromIndex < targetIndex ? targetIndex - 1 : targetIndex;
      const [movedSlide] = slideOrder.splice(fromIndex, 1);
      slideOrder.splice(adjustedTargetIndex, 0, movedSlide);
      persistSlideOrder();
      applySlideOrder(movedSlide);
      renderEditorCards();
    }

    function toggleAddMenu(forceOpen) {
      const shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : addMenu.hidden;
      addMenu.hidden = !shouldOpen;
      addMenuButton.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
    }

    function showToolPanel(tool) {
      addSliderForm.hidden = tool !== 'slider';
      addMediaForm.hidden = tool !== 'media';
      toggleAddMenu(false);
      const activeForm = tool === 'slider' ? addSliderForm : addMediaForm;
      activeForm.querySelector('input, select')?.focus();
    }

    function openEditor() {
      document.body.classList.add('editor-open');
      editor.setAttribute('aria-hidden', 'false');
      openEditorButton.hidden = true;
      renderEditorCards();
      exitEditorButton.focus();
    }

    function closeEditor() {
      window.location.href = 'https://megarypointe.github.io/grow-presentation/';
    }

    function updateDeck() {
      slides.forEach((slide, index) => {
        slide.classList.toggle('active', index === currentSlide);
        slide.setAttribute('aria-hidden', index === currentSlide ? 'false' : 'true');
      });

      // Preload the next/previous slide image to keep navigation smooth.
      [currentSlide + 1, currentSlide - 1].forEach((index) => {
        const img = slides[index]?.querySelector('img');
        if (img) {
          const preload = new Image();
          preload.src = img.src;
        }
      });
    }

    function goToSlide(index) {
      currentSlide = Math.max(0, Math.min(index, slides.length - 1));
      updateDeck();
    }

    function nextSlide() { goToSlide(currentSlide + 1); }
    function prevSlide() { goToSlide(currentSlide - 1); }

    window.addEventListener('keydown', (event) => {
      if (document.body.classList.contains('editor-open')) {
        if (event.key === 'Escape') {
          event.preventDefault();
          closeEditor();
        }
        return;
      }

      if (event.key === 'ArrowRight') {
        event.preventDefault();
        nextSlide();
      }
      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        prevSlide();
      }
      if (event.key.toLowerCase() === 'e') {
        event.preventDefault();
        openEditor();
      }
    });

    openEditorButton.addEventListener('click', openEditor);
    exitEditorButton.addEventListener('click', closeEditor);
    addMenuButton?.addEventListener('click', () => toggleAddMenu());
    addMenuOptions.forEach((option) => {
      option.addEventListener('click', () => showToolPanel(option.dataset.tool));
    });
    document.addEventListener('click', (event) => {
      if (!addMenu.hidden && !event.target.closest('.editor-title-row')) {
        toggleAddMenu(false);
      }
    });
    addSliderForm?.addEventListener('submit', (event) => {
      event.preventDefault();
      createSliderSlide(
        sliderQuestionInput.value.trim(),
        Number(sliderMinInput.value),
        Number(sliderMaxInput.value)
      );
      addSliderForm.reset();
      sliderMinInput.value = '1';
      sliderMaxInput.value = '5';
    });
    addMediaForm?.addEventListener('submit', (event) => {
      event.preventDefault();
      const file = mediaFileInput.files?.[0];
      if (!file) return;
      createMediaSlide(mediaTypeSelect.value, file);
      addMediaForm.reset();
    });

    const slider = document.querySelector('#discipleshipScore');
    const scoreValue = document.querySelector('#scoreValue');
    const helperText = document.querySelector('#helperText');

    const labels = {
      1: 'Needs significant attention.',
      2: 'Some pieces are present, but gaps remain.',
      3: 'Moderately strong with room to grow.',
      4: 'Strong and mostly intentional.',
      5: 'Very strong, clear, and repeatable.'
    };

    function updateScore() {
      scoreValue.textContent = slider.value;
      helperText.textContent = labels[slider.value];
    }

    slider.addEventListener('input', updateScore);
    updateScore();
    applySlideOrder(slideOrder[0]);
    renderEditorCards();
  </script>
</body>
</html>
