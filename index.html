    function navigateToPresentationsHome() {
      history.pushState({}, '', '/');
      showManagementPage();
      renderPresentationManager();
    }

    async function inviteUser(email) {
      const trimmed = String(email || '').trim();
      if (!trimmed || !isOwnerUser(currentUser)) return;
      try {
        const data = await requestJson(USERS_API_URL, '', {
          method: 'POST',
          body: JSON.stringify({ email: trimmed })
        });
        const temporaryPassword = data.temporaryPassword;
        try { await navigator.clipboard.writeText(temporaryPassword); } catch (error) {}
        window.prompt(`Temporary password for ${data.user.email}. Share it securely; they'll be asked to reset it.`, temporaryPassword);
        await showTeamPage();
      } catch (error) {
        editorStatus.textContent = 'Could not create that user.';
      }
    }

    async function signOut() {
      try { await authRequest('/logout', { method: 'POST' }); } catch (error) {}
      clearAuthToken();
      currentUser = null;
      presentations = [];
      showLoginPanel('Signed out.');
    }

    async function loadPresentations() {
      try {
        const data = await apiRequest();
        return Array.isArray(data.presentations) ? data.presentations.map(normalizePresentationRecord) : FALLBACK_PRESENTATIONS;
      } catch (error) {
        if (error.status === 401) {
          showLoginPanel();
          return null;
        }
        editorStatus.textContent = 'Could not reach the presentation server. Try refreshing in a moment.';
        return FALLBACK_PRESENTATIONS;
      }
    }

    function getRequestedPresentationId() {
      const pathId = window.location.pathname.replace(/^\/+|\/+$/g, '');
      return /^\d{7}$/.test(pathId) ? pathId : '';
    }

    function loadActivePresentationId(availablePresentations) {
      const requestedPresentationId = getRequestedPresentationId();
      if (requestedPresentationId && availablePresentations.some((presentation) => presentation.id === requestedPresentationId)) {
        return requestedPresentationId;
      }
      return availablePresentations[0]?.id || '';
    }

    function loadPresentationState() {
      activePresentation = presentations.find((presentation) => presentation.id === activePresentationId) || presentations[0];
      if (!activePresentation) return;
      activePresentationId = activePresentation.id;
      customSlides = Array.isArray(activePresentation.customSlides) ? activePresentation.customSlides : [];
      deletedSlideIds = Array.isArray(activePresentation.deletedSlideIds) ? activePresentation.deletedSlideIds : [];
      refreshSlideDefinitions();
      slideOrder = loadSlideOrder();
      activePresentation.slideOrder = slideOrder;
    }

    async function saveActivePresentation() {
      if (!activePresentation) return;
      activePresentation.customSlides = customSlides;
      activePresentation.deletedSlideIds = deletedSlideIds;
      activePresentation.slideOrder = slideOrder;
      try {
        const data = await apiRequest(`/${encodeURIComponent(activePresentation.id)}`, {
          method: 'PUT',
          body: JSON.stringify(activePresentation)
        });
        const saved = normalizePresentationRecord(data.presentation);
        const index = presentations.findIndex((presentation) => presentation.id === saved.id);
        if (index >= 0) presentations[index] = saved;
        activePresentation = presentations.find((presentation) => presentation.id === saved.id) || saved;
      } catch (error) {
        editorStatus.textContent = 'Could not save to the presentation server. Try again in a moment.';
      }
    }

    async function createPresentation(name) {
      const title = name.trim() || `Slideshow ${presentations.length + 1}`;
      try {
        const data = await apiRequest('', {
          method: 'POST',
          body: JSON.stringify({ title })
        });
        const presentation = normalizePresentationRecord(data.presentation);
        presentations.push(presentation);
        selectPresentation(presentation.id);
      } catch (error) {
        editorStatus.textContent = 'Could not create that slideshow on the server.';
      }
    }

    function selectPresentation(presentationId) {
      if (!presentations.some((presentation) => presentation.id === presentationId)) return;
      activePresentationId = presentationId;
      rebuildPresentation();
      editorStatus.textContent = '';
    }

    function getPresentationSlideCount(presentation) {
      const customCount = Array.isArray(presentation.customSlides) ? presentation.customSlides.length : 0;
      const deletedCount = Array.isArray(presentation.deletedSlideIds) ? presentation.deletedSlideIds.length : 0;
      return Math.max(0, baseSlideDefinitions.length + customCount - deletedCount);
    }

    function getPresentationThumbnail(presentation) {
      const removedSlideIds = Array.isArray(presentation.deletedSlideIds) ? presentation.deletedSlideIds : [];
      const presentationSlides = [
        ...baseSlideDefinitions,
        ...(Array.isArray(presentation.customSlides) ? presentation.customSlides : [])
      ].filter((slide) => !removedSlideIds.includes(slide.id));
      const availableIds = presentationSlides.map((slide) => slide.id);
      const firstSlideId = normalizeSlideOrder(Array.isArray(presentation.slideOrder) ? presentation.slideOrder : [], availableIds)[0];
      return presentationSlides.find((slide) => slide.id === firstSlideId) || presentationSlides[0];
    }

    function renderThumbnail(thumbnail) {
      if (!thumbnail) return '<div class="slide-card-placeholder">Slideshow</div>';
      if (thumbnail.kind === 'image') {
        return `<img src="assets/slides/${thumbnail.file}" alt="${escapeAttribute(thumbnail.title)} thumbnail" loading="eager" decoding="async" />`;
      }
      if (thumbnail.kind === 'media-image') {
        return `<img src="${thumbnail.dataUrl}" alt="${escapeAttribute(thumbnail.title)} thumbnail" loading="eager" decoding="async" />`;
      }
      if (thumbnail.kind === 'media-video') return '<div class="slide-card-placeholder">Video</div>';
      if (thumbnail.kind === 'media-pdf') return '<div class="slide-card-placeholder">PDF</div>';
      if (thumbnail.kind === 'custom-slider') return `<div class="slide-card-question">${escapeAttribute(thumbnail.question)}</div>`;
      if (thumbnail.kind === 'custom-buttons') return `<div class="slide-card-question">${escapeAttribute(thumbnail.question)}</div>`;
      return `<div class="slide-card-placeholder">${escapeAttribute(thumbnail.title || 'Slide')}</div>`;
    }

    function updateActivePresentationTitle() {
      if (!activePresentation) return;
      activePresentationTitle.textContent = activePresentation.title;
      document.title = `${activePresentation.title} Editor`;
    }

    function toggleCreatePresentationForm(forceOpen) {
      const shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : createPresentationForm.hidden;
      createPresentationForm.hidden = !shouldOpen;
      newPresentationButton.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
      if (shouldOpen) presentationNameInput.focus();
    }

    function renderPresentationManager() {
      presentationList.innerHTML = presentations.map((presentation) => {
        const thumbnail = getPresentationThumbnail(presentation);
        return `
          <article class="slideshow-card" data-presentation-id="${escapeAttribute(presentation.id)}">
            <button class="slideshow-card-main" type="button" data-presentation-action="present" data-presentation-id="${escapeAttribute(presentation.id)}" aria-label="Present ${escapeAttribute(presentation.title)}">
              <figure class="slideshow-thumbnail">${renderThumbnail(thumbnail)}</figure>
              <span class="slideshow-title">${escapeAttribute(presentation.title)}</span>
            </button>
            <button class="slideshow-menu-button" type="button" aria-label="Slideshow options" aria-expanded="false">⋯</button>
            <div class="slideshow-menu" hidden>
              <button type="button" data-presentation-action="edit" data-presentation-id="${escapeAttribute(presentation.id)}">Edit</button>
              <button type="button" data-presentation-action="rename" data-presentation-id="${escapeAttribute(presentation.id)}">Rename</button>
              <button type="button" data-presentation-action="duplicate" data-presentation-id="${escapeAttribute(presentation.id)}">Duplicate</button>
              <button type="button" data-presentation-action="delete" data-presentation-id="${escapeAttribute(presentation.id)}">Delete</button>
            </div>
          </article>
        `;
      }).join('');
      presentationList.querySelectorAll('[data-presentation-action="present"]').forEach((button) => {
        button.addEventListener('click', () => presentPresentation(button.dataset.presentationId));
      });
      presentationList.querySelectorAll('.slideshow-menu-button').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          togglePresentationMenu(button.closest('.slideshow-card'));
        });
      });
      presentationList.querySelectorAll('[data-presentation-action="edit"]').forEach((button) => {
        button.addEventListener('click', () => editPresentation(button.dataset.presentationId));
      });
      presentationList.querySelectorAll('[data-presentation-action="rename"]').forEach((button) => {
        button.addEventListener('click', () => renamePresentation(button.dataset.presentationId));
      });
      presentationList.querySelectorAll('[data-presentation-action="duplicate"]').forEach((button) => {
        button.addEventListener('click', () => duplicatePresentation(button.dataset.presentationId));
      });
      presentationList.querySelectorAll('[data-presentation-action="delete"]').forEach((button) => {
        button.addEventListener('click', () => deletePresentation(button.dataset.presentationId));
      });
    }

    function togglePresentationMenu(card, forceOpen) {
      const menu = card?.querySelector('.slideshow-menu');
      const button = card?.querySelector('.slideshow-menu-button');
      if (!menu || !button) return;
      presentationList.querySelectorAll('.slideshow-menu').forEach((otherMenu) => {
        if (otherMenu !== menu) {
          otherMenu.hidden = true;
          otherMenu.previousElementSibling?.setAttribute('aria-expanded', 'false');
        }
      });
      const shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : menu.hidden;
      menu.hidden = !shouldOpen;
      button.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
    }

    function showManagementPage() {
      document.body.classList.add('editor-open', 'library-mode');
      document.body.classList.remove('editing-slideshow');
      editor.setAttribute('aria-hidden', 'false');
      libraryHeader.hidden = false;
      teamPage.hidden = true;
      presentationManager.hidden = false;
      editorWorkspace.hidden = true;
      if (openEditorButton) openEditorButton.hidden = true;
      document.title = 'Grow Presentations';
      updateDeck();
    }

    function showPresentationPage(presentationId) {
      selectPresentation(presentationId);
      closeEditor();
      document.title = activePresentation ? activePresentation.title : 'Grow Presentation';
    }

    function presentPresentation(presentationId) {
      if (!presentations.some((presentation) => presentation.id === presentationId)) return;
      history.pushState({ presentationId }, '', `/${encodeURIComponent(presentationId)}`);
      showPresentationPage(presentationId);
    }

    function editPresentation(presentationId) {
      selectPresentation(presentationId);
      libraryHeader.hidden = true;
      presentationManager.hidden = true;
      createPresentationForm.hidden = true;
      teamPage.hidden = true;
      editorWorkspace.hidden = false;
      document.body.classList.remove('library-mode');
      document.body.classList.add('editing-slideshow');
      editorWorkspace.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    async function renamePresentation(presentationId) {
      const presentation = presentations.find((item) => item.id === presentationId);
      if (!presentation) return;
      const nextTitle = window.prompt('Rename slideshow', presentation.title);
      if (nextTitle === null) return;
      const title = nextTitle.trim();
      if (!title || title === presentation.title) return;
      try {
        const data = await apiRequest(`/${encodeURIComponent(presentationId)}`, {
          method: 'PUT',
          body: JSON.stringify({ ...presentation, title })
        });
        const saved = normalizePresentationRecord(data.presentation);
        const index = presentations.findIndex((item) => item.id === saved.id);
        if (index >= 0) presentations[index] = saved;
        if (activePresentationId === saved.id) activePresentation = saved;
        updateActivePresentationTitle();
        renderPresentationManager();
      } catch (error) {
        editorStatus.textContent = 'Could not rename that slideshow on the server.';
      }
    }

    async function duplicatePresentation(presentationId) {
      try {
        const data = await apiRequest(`/${encodeURIComponent(presentationId)}/duplicate`, { method: 'POST' });
        const copy = normalizePresentationRecord(data.presentation);
        presentations.push(copy);
        activePresentationId = copy.id;
        rebuildPresentation();
      } catch (error) {
        editorStatus.textContent = 'Could not duplicate that slideshow on the server.';
      }
    }

    async function deletePresentation(presentationId) {
      try {
        await apiRequest(`/${encodeURIComponent(presentationId)}`, { method: 'DELETE' });
        presentations = presentations.filter((presentation) => presentation.id !== presentationId);
        if (activePresentationId === presentationId) activePresentationId = presentations[0]?.id || '';
        rebuildPresentation();
      } catch (error) {
        editorStatus.textContent = 'Could not delete that slideshow on the server.';
      }
    }

    function rebuildPresentation() {
      loadPresentationState();
      if (!activePresentation) {
        customSlides = [];
        deletedSlideIds = [];
        slideDefinitions = [];
        slideOrder = [];
        deck.innerHTML = '';
        slideElementsById.clear();
        slides = [];
        editorGrid.innerHTML = '';
        if (pathwayMap) pathwayMap.innerHTML = '';
        renderPresentationManager();
        return;
      }
      currentSlide = 0;
      renderDeckSlides();
      applySlideOrder(slideOrder[0]);
      renderEditorCards();
      updateActivePresentationTitle();
      renderPresentationManager();
    }

    function refreshSlideDefinitions() {
      slideDefinitions = [...baseSlideDefinitions, ...customSlides].filter((slide) => !deletedSlideIds.includes(slide.id));
      defaultSlideOrder = slideDefinitions.map((slide) => slide.id);
    }

    function registerCustomSlide(definition, insertIndex = slideOrder.length) {
      customSlides.push(definition);
      refreshSlideDefinitions();
      saveCustomSlides();
      slideElementsById.set(definition.id, buildSlideElement(definition, slideDefinitions.length - 1));
      slideOrder.splice(Math.max(0, Math.min(insertIndex, slideOrder.length)), 0, definition.id);
      persistSlideOrder();
      applySlideOrder(definition.id);
      renderEditorCards();
    }

    function getUniqueDuplicateSlideId(slideId) {
      const safeBase = String(slideId || 'slide').replace(/[^a-z0-9-]/gi, '-').replace(/^-+|-+$/g, '').toLowerCase() || 'slide';
      let candidate = `${safeBase}-copy`;
      let suffix = 2;
      while (slideDefinitions.some((slide) => slide.id === candidate) || customSlides.some((slide) => slide.id === candidate)) {
        candidate = `${safeBase}-copy-${suffix}`;
        suffix += 1;
      }
      return candidate;
    }

    function cloneSlideDefinitionForDuplicate(slideId) {
      const source = slideDefinitions.find((slide) => slide.id === slideId);
      if (!source) return null;
      const duplicateId = getUniqueDuplicateSlideId(slideId);
      const duplicate = JSON.parse(JSON.stringify(source));
      duplicate.id = duplicateId;
      duplicate.title = `${source.title || source.question || 'Slide'} Copy`;
      if (duplicate.kind === 'custom-slider' || duplicate.kind === 'custom-buttons') {
        duplicate.question = source.question || duplicate.title;
      }
      if (duplicate.kind === 'custom-buttons') {
        duplicate.choices = (source.choices || [])
          .map(normalizeButtonChoice)
          .map((choice, index) => ensureButtonChoiceBranch({ ...choice, branchId: '' }, index, duplicateId));
      }
      return duplicate;
    }

    function duplicateSlide(slideId) {
      const duplicate = cloneSlideDefinitionForDuplicate(slideId);
      if (!duplicate) return;
      customSlides.push(duplicate);
      refreshSlideDefinitions();
      renderDeckSlides();
      const sourceIndex = slideOrder.indexOf(slideId);
      const insertIndex = sourceIndex >= 0 ? sourceIndex + 1 : slideOrder.length;
      slideOrder.splice(insertIndex, 0, duplicate.id);
      saveCustomSlides();
      persistSlideOrder();
      applySlideOrder(duplicate.id);
      renderEditorCards();
      editorStatus.textContent = `Duplicated ${getSlideCardTitle(slideId)}.`;
    }

    function getSliderNumberRange() {
      const min = Number(sliderMinInput.value);
      const max = Number(sliderMaxInput.value);
      const safeMin = Number.isFinite(min) ? Math.round(min) : 1;
      const safeMax = Number.isFinite(max) && max >= safeMin ? Math.round(max) : safeMin;
      return Array.from({ length: safeMax - safeMin + 1 }, (_, index) => safeMin + index);
    }

    function escapeAttribute(value = '') {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('"', '&quot;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function renderSliderLabelFields(labels = collectSliderLabels()) {
      sliderLabelFields.innerHTML = getSliderNumberRange().map((value) => `
        <label class="slider-label-field">
          <span>${value}</span>
          <input type="text" data-slider-label-value="${value}" value="${escapeAttribute(labels[value] || '')}" placeholder="Description for ${value}" />
        </label>
      `).join('');
    }

    function collectSliderLabels() {
      return [...sliderLabelFields.querySelectorAll('[data-slider-label-value]')].reduce((labels, input) => {
        if (input.value.trim()) labels[input.dataset.sliderLabelValue] = input.value.trim();
        return labels;
      }, {});
    }

    function populateSliderLabelFields(labels = {}) {
      renderSliderLabelFields(labels);
    }

    function getButtonChoiceCount() {
      const count = Number(buttonChoiceCountInput.value);
      return Math.max(1, Math.min(12, Number.isFinite(count) ? Math.round(count) : 3));
    }

    function normalizeButtonChoice(choice, index = 0) {
      if (typeof choice === 'string') {
        const label = choice.trim() || `Button ${index + 1}`;
        return { label, targetSlideId: '', branchId: '', branchName: label };
      }
      const label = choice?.label?.trim() || `Button ${index + 1}`;
      return {
        label,
        targetSlideId: slideDefinitions.some((slide) => slide.id === choice?.targetSlideId) ? choice.targetSlideId : '',
        branchId: choice?.branchId || '',
        branchName: choice?.branchName?.trim() || label
      };
    }

    function ensureButtonChoiceBranch(choice, index = 0, parentSlideId = 'button-slide') {
      const normalized = normalizeButtonChoice(choice, index);
      const safeParentId = String(parentSlideId || 'button-slide').replace(/[^a-z0-9-]/gi, '-').toLowerCase();
      const safeBranchName = String(normalized.branchName || normalized.label || `Branch ${index + 1}`).replace(/[^a-z0-9-]/gi, '-').replace(/^-+|-+$/g, '').toLowerCase() || `branch-${index + 1}`;
      return {
        ...normalized,
        branchId: normalized.branchId || `${safeParentId}-branch-${index + 1}-${safeBranchName}`,
        branchName: normalized.branchName || `Branch ${index + 1}`
      };
    }

    function getButtonChoiceLabel(choice, index = 0) {
      return normalizeButtonChoice(choice, index).label;
    }

    function getPathwayTitle(choice, index = 0) {
      const normalized = normalizeButtonChoice(choice, index);
      return normalized.branchName?.trim() || normalized.label;
    }

    function updateButtonChoiceBranchName(hubId, branchId, title) {
      const hub = customSlides.find((slide) => slide.id === hubId && slide.kind === 'custom-buttons');
      if (!hub) return false;
      hub.choices = (hub.choices || []).map((choice, index) => {
        const normalized = ensureButtonChoiceBranch(choice, index, hub.id);
        if (normalized.branchId !== branchId) return normalized;
        return { ...normalized, branchName: title.trim() || normalized.label };
      });
      saveCustomSlides();
      renderEditorCards();
      editorStatus.textContent = 'Saved pathway title.';
      return true;
    }

    function getBranchStartLabels(slideId) {
      return customSlides
        .filter((slide) => slide.kind === 'custom-buttons')
        .flatMap((slide) => (slide.choices || []).map(normalizeButtonChoice))
        .filter((choice) => choice.targetSlideId === slideId)
        .map((choice) => choice.branchName || choice.label);
    }

    function getSlideCardTitle(slideId, fallbackIndex = 0) {
      const definition = slideDefinitions.find((slide) => slide.id === slideId);
      return definition?.title || definition?.question || `Slide ${fallbackIndex + 1}`;
    }

    function getSlidesForButtonPath(choice, siblingChoices = []) {
      const normalized = normalizeButtonChoice(choice);
      const startIndex = slideOrder.indexOf(normalized.targetSlideId);
      if (startIndex < 0) return [];
      const nextStartIndex = siblingChoices
        .map(normalizeButtonChoice)
        .map((sibling) => slideOrder.indexOf(sibling.targetSlideId))
        .filter((index) => index > startIndex)
        .sort((a, b) => a - b)[0] || slideOrder.length;
      return slideOrder.slice(startIndex, nextStartIndex);
    }

    function getButtonPathways() {
      return customSlides
        .filter((slide) => slide.kind === 'custom-buttons')
        .map((hub) => ({
          hub,
          choices: (hub.choices || []).map((choice, index) => ensureButtonChoiceBranch(choice, index, hub.id))
        }));
    }

    function getSlidesBeforeHub(hubId) {
      const hubIndex = slideOrder.indexOf(hubId);
      return slideOrder.slice(0, hubIndex >= 0 ? hubIndex : 0);
    }

    function updateButtonChoiceTarget(hubId, branchId, slideId) {
      const hub = customSlides.find((slide) => slide.id === hubId && slide.kind === 'custom-buttons');
      if (!hub) return false;
      hub.choices = (hub.choices || []).map((choice, index) => {
        const normalized = ensureButtonChoiceBranch(choice, index, hub.id);
        return normalized.branchId === branchId ? { ...normalized, targetSlideId: slideId } : normalized;
      });
      saveCustomSlides();
      replaceSlideElement(hub.id);
      return true;
    }

    function setFlowDragState(column, isActive) {
      column?.classList.toggle('flow-drag-over', Boolean(isActive));
    }

    function getFlowDropPlacement(card, event) {
      const rect = card.getBoundingClientRect();
      return event.clientY < rect.top + rect.height / 2 ? 'before' : 'after';
    }

    function setFlowDropIndicator(card, placement) {
      clearFlowDropIndicators();
      card?.classList.toggle('flow-insert-before', placement === 'before');
      card?.classList.toggle('flow-insert-after', placement === 'after');
    }

    function clearFlowDropIndicators() {
      pathwayMap?.querySelectorAll('.flow-insert-before, .flow-insert-after').forEach((card) => {
        card.classList.remove('flow-insert-before', 'flow-insert-after');
      });
    }

    function getBranchInsertIndex(hubId, branchId, targetSlideId = '', placement = 'after') {
      const pathway = getButtonPathways().find((item) => item.hub.id === hubId);
      const choice = pathway?.choices.find((item) => item.branchId === branchId);
      if (!pathway || !choice) return slideOrder.length;
      const branchSlides = getSlidesForButtonPath(choice, pathway.choices);
      if (targetSlideId && branchSlides.includes(targetSlideId)) {
        const targetIndex = slideOrder.indexOf(targetSlideId);
        return targetIndex + (placement === 'after' ? 1 : 0);
      }
      if (branchSlides.length) {
        return slideOrder.indexOf(branchSlides[branchSlides.length - 1]) + 1;
      }
      const hubIndex = slideOrder.indexOf(hubId);
      return hubIndex >= 0 ? hubIndex + 1 : slideOrder.length;
    }

    function moveSlideToPathway(slideId, hubId, branchId, targetSlideId = '', placement = 'after') {
      if (!slideId || slideId === hubId || slideId === targetSlideId) return false;
      const pathway = getButtonPathways().find((item) => item.hub.id === hubId);
      const choice = pathway?.choices.find((item) => item.branchId === branchId);
      const fromIndex = slideOrder.indexOf(slideId);
      if (!pathway || !choice || fromIndex < 0) return false;

      let insertIndex = getBranchInsertIndex(hubId, branchId, targetSlideId, placement);
      slideOrder.splice(fromIndex, 1);
      if (fromIndex < insertIndex) insertIndex -= 1;
      slideOrder.splice(Math.max(0, Math.min(insertIndex, slideOrder.length)), 0, slideId);
      const shouldBecomeBranchStart = !choice.targetSlideId || (targetSlideId === choice.targetSlideId && placement === 'before');
      if (shouldBecomeBranchStart) {
        updateButtonChoiceTarget(hubId, branchId, slideId);
      }
      persistSlideOrder();
      applySlideOrder(slideId);
      renderEditorCards();
      editorStatus.textContent = `Moved ${getSlideCardTitle(slideId)} into ${choice.branchName || choice.label}.`;
      return true;
    }

    function renderSlideOptionsMenu(slideId, canEdit = false) {
      return `
        <button class="card-menu-button" type="button" aria-label="Slide options" aria-expanded="false">⋯</button>
        <div class="card-menu" hidden>
          ${canEdit ? '<button type="button" data-card-action="edit">Edit</button>' : ''}
          <button type="button" data-card-action="duplicate">Duplicate</button>
          <button type="button" data-card-action="delete">Delete</button>
        </div>
      `;
    }

    function renderPathwayStepCard(slideId, index, kicker = `Slide ${slideOrder.indexOf(slideId) + 1}`) {
      const definition = slideDefinitions.find((slide) => slide.id === slideId);
      return `
        <article class="flow-slide-card" draggable="true" data-pathway-slide-id="${escapeAttribute(slideId)}" aria-label="${escapeAttribute(getSlideCardTitle(slideId, index))}">
          <button class="flow-card-main" type="button" data-pathway-card-preview="true" aria-label="Preview ${escapeAttribute(getSlideCardTitle(slideId, index))}">
            <figure class="flow-card-thumbnail">${renderThumbnail(definition)}</figure>
          </button>
          ${renderSlideOptionsMenu(slideId)}
        </article>
      `;
    }

    function renderPathwayMap() {
      if (!pathwayMap) return;
      const pathways = getButtonPathways();
      pathwayMap.innerHTML = pathways.map(({ hub, choices }) => {
        const normalSlides = getSlidesBeforeHub(hub.id);
        return `
          <section class="pathway-map-board" data-pathway-hub-id="${escapeAttribute(hub.id)}">
            <div class="flow-linear-row" aria-label="Normal slides before this button slide">
              ${normalSlides.map((slideId, index) => renderPathwayStepCard(slideId, index)).join('')}
              <article class="flow-slide-card flow-hub-card" data-pathway-slide-id="${escapeAttribute(hub.id)}" aria-label="${escapeAttribute(hub.question || hub.title || 'Choose a path')}">
                <button class="flow-card-main" type="button" data-pathway-card-preview="true" aria-label="Edit ${escapeAttribute(hub.question || hub.title || 'button slide')}">
                  <figure class="flow-card-thumbnail">${renderThumbnail(hub)}</figure>
                </button>
                ${renderSlideOptionsMenu(hub.id, true)}
              </article>
            </div>
            <div class="flow-branch-board">
              ${choices.map((choice, choiceIndex) => {
                const slidesInPath = getSlidesForButtonPath(choice, choices);
                return `
                  <section class="flow-branch-column" data-pathway-branch-id="${escapeAttribute(choice.branchId || '')}" data-pathway-branch-drop-id="${escapeAttribute(choice.branchId || '')}" data-pathway-hub-id="${escapeAttribute(hub.id)}">
                    <label class="flow-branch-title">
                      <span class="sr-only">Pathway title for ${escapeAttribute(choice.label)}</span>
                      <input class="flow-branch-title-input" type="text" value="${escapeAttribute(getPathwayTitle(choice))}" data-pathway-title-hub-id="${escapeAttribute(hub.id)}" data-pathway-title-branch-id="${escapeAttribute(choice.branchId || '')}" aria-label="Pathway title for ${escapeAttribute(choice.label)}" />
                    </label>
                    ${slidesInPath.length
                      ? slidesInPath.map((slideId, slideIndex) => renderPathwayStepCard(slideId, slideIndex)).join('')
                      : '<div class="flow-empty-card">Drop slides here</div>'}
                  </section>
                `;
              }).join('')}
            </div>
          </section>
        `;
      }).join('');

      pathwayMap.querySelectorAll('.flow-slide-card').forEach((card) => {
        attachSlideOptionsMenu(card, card.dataset.pathwaySlideId);
      });

      pathwayMap.querySelectorAll('.flow-hub-card').forEach((button) => {
        const hub = slideDefinitions.find((slide) => slide.id === button.dataset.pathwaySlideId);
        button.addEventListener('click', () => {
          if (hub?.kind === 'custom-buttons') editCustomSlide(hub.id);
        });
      });

      pathwayMap.querySelectorAll('[data-pathway-branch-drop-id]').forEach((column) => {
        const hubId = column.dataset.pathwayHubId;
        const branchId = column.dataset.pathwayBranchDropId;
        column.addEventListener('dragover', (event) => {
          event.preventDefault();
          event.dataTransfer.dropEffect = 'move';
          clearFlowDropIndicators();
          setFlowDragState(column, true);
        });
        column.addEventListener('dragleave', (event) => {
          if (!column.contains(event.relatedTarget)) {
            setFlowDragState(column, false);
            clearFlowDropIndicators();
          }
        });
        column.addEventListener('drop', (event) => {
          event.preventDefault();
          clearFlowDropIndicators();
          setFlowDragState(column, false);
          const droppedSlideId = event.dataTransfer.getData('text/plain') || draggedFlowSlideId;
          if (droppedSlideId) moveSlideToPathway(droppedSlideId, hubId, branchId);
        });
      });

      pathwayMap.querySelectorAll('.flow-branch-title-input').forEach((input) => {
        const hubId = input.dataset.pathwayTitleHubId;
        const branchId = input.dataset.pathwayTitleBranchId;
        input.addEventListener('click', (event) => event.stopPropagation());
        input.addEventListener('dragstart', (event) => event.preventDefault());
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            input.blur();
          }
          if (event.key === 'Escape') {
            event.preventDefault();
            renderEditorCards();
          }
        });
        input.addEventListener('change', () => updateButtonChoiceBranchName(hubId, branchId, input.value));
      });

      pathwayMap.querySelectorAll('.flow-slide-card:not(.flow-hub-card)').forEach((button) => {
        const branchColumn = button.closest('[data-pathway-branch-drop-id]');
        const hubId = branchColumn?.dataset.pathwayHubId;
        const branchId = branchColumn?.dataset.pathwayBranchDropId;
        button.addEventListener('dragstart', (event) => {
          const slideId = button.dataset.pathwaySlideId;
          draggedFlowSlideId = slideId;
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', slideId);
          button.classList.add('dragging');
        });
        button.addEventListener('dragend', () => {
          draggedFlowSlideId = null;
          button.classList.remove('dragging');
          clearFlowDropIndicators();
          pathwayMap.querySelectorAll('.flow-drag-over').forEach((column) => setFlowDragState(column, false));
        });
        button.addEventListener('dragover', (event) => {
          if (!branchColumn) return;
          event.preventDefault();
          event.stopPropagation();
          event.dataTransfer.dropEffect = 'move';
          setFlowDragState(branchColumn, true);
          setFlowDropIndicator(button, getFlowDropPlacement(button, event));
        });
        button.addEventListener('dragleave', (event) => {
          if (!button.contains(event.relatedTarget)) clearFlowDropIndicators();
        });
        button.addEventListener('drop', (event) => {
          if (!branchColumn) return;
          event.preventDefault();
          event.stopPropagation();
          clearFlowDropIndicators();
          setFlowDragState(branchColumn, false);
          const droppedSlideId = event.dataTransfer.getData('text/plain') || draggedFlowSlideId;
          const targetSlideId = button.dataset.pathwaySlideId;
          const placement = getFlowDropPlacement(button, event);
          if (droppedSlideId) moveSlideToPathway(droppedSlideId, hubId, branchId, targetSlideId, placement);
        });
        button.addEventListener('click', () => {
          const slideId = button.dataset.pathwaySlideId;
          if (!slideId) return;
          goToSlideId(slideId);
          editorStatus.textContent = `Previewing ${getSlideCardTitle(slideId)}.`;
        });
      });
    }

    function renderButtonChoiceFields(choices = collectButtonChoices()) {
      const count = getButtonChoiceCount();
      const normalizedChoices = choices.map(normalizeButtonChoice);
      buttonChoiceFields.innerHTML = Array.from({ length: count }, (_, index) => {
        const choice = normalizeButtonChoice(normalizedChoices[index], index);
        return `
          <div class="branch-choice-row">
            <label>
              Button ${index + 1}
              <input type="text" data-button-choice-index="${index}" value="${escapeAttribute(choice.label)}" placeholder="Button ${index + 1}" />
            </label>
            <label>
              Branch name
              <input type="text" data-button-branch-index="${index}" value="${escapeAttribute(choice.branchName || choice.label)}" placeholder="Branch ${index + 1}" />
              <input type="hidden" data-button-branch-id-index="${index}" value="${escapeAttribute(choice.branchId || '')}" />
              <input type="hidden" data-button-target-id-index="${index}" value="${escapeAttribute(choice.targetSlideId || '')}" />
            </label>
          </div>
        `;
      }).join('');
    }

    function collectButtonChoices() {
      return [...buttonChoiceFields.querySelectorAll('[data-button-choice-index]')]
        .map((input, index) => {
          const targetInput = buttonChoiceFields.querySelector(`[data-button-target-id-index="${index}"]`);
          const branchInput = buttonChoiceFields.querySelector(`[data-button-branch-index="${index}"]`);
          const branchIdInput = buttonChoiceFields.querySelector(`[data-button-branch-id-index="${index}"]`);
          return {
            label: input.value.trim() || `Button ${index + 1}`,
            targetSlideId: targetInput?.value || '',
            branchId: branchIdInput?.value || '',
            branchName: branchInput?.value.trim() || input.value.trim() || `Branch ${index + 1}`
          };
        });
    }

    function populateButtonChoiceFields(choices = []) {
      buttonChoiceCountInput.value = String(Math.max(1, Math.min(12, choices.length || 3)));
      renderButtonChoiceFields(choices);
    }

    function createSliderSlide(question, min, max, labels = {}) {
      const safeMin = Number.isFinite(min) ? min : 1;
      const safeMax = Number.isFinite(max) && max > safeMin ? max : safeMin + 4;
      const definition = {
        id: `custom-slider-${Date.now()}`,
        title: question,
        question,
        min: safeMin,
        max: safeMax,
        value: Math.round((safeMin + safeMax) / 2),
        labels,
        kind: 'custom-slider'
      };
      registerCustomSlide(definition);
    }

    function replaceSlideElement(slideId) {
      const definition = slideDefinitions.find((slide) => slide.id === slideId);
      if (!definition) return;
      const oldElement = slideElementsById.get(slideId);
      const newElement = buildSlideElement(definition, slideDefinitions.findIndex((slide) => slide.id === slideId));
      oldElement?.replaceWith(newElement);
      slideElementsById.set(slideId, newElement);
      renderEditorCards();
      applySlideOrder(slideId);
    }

    function updateSliderSlide(slideId, question, min, max, labels = {}) {
      const definition = slideDefinitions.find((slide) => slide.id === slideId);
      if (!definition) return;
      definition.title = question;
      definition.question = question;
      definition.min = Number.isFinite(min) ? min : definition.min;
      definition.max = Number.isFinite(max) && max > definition.min ? max : definition.max;
      definition.value = Math.max(definition.min, Math.min(definition.value, definition.max));
      definition.labels = labels;
      if (customSlides.some((slide) => slide.id === slideId)) {
        saveCustomSlides();
      }
      replaceSlideElement(slideId);
    }

    function createButtonsSlide(question, choices = []) {
      const safeQuestion = question.trim() || 'Click all that apply:';
      const definition = {
        id: `custom-buttons-${Date.now()}`,
        title: safeQuestion,
        question: safeQuestion,
        choices: [],
        kind: 'custom-buttons'
      };
      const safeChoices = choices.map(normalizeButtonChoice).map((choice, index) => ensureButtonChoiceBranch(choice, index, definition.id)).slice(0, 12);
      definition.choices = safeChoices.length ? safeChoices : [
        ensureButtonChoiceBranch({ label: 'Button 1', targetSlideId: '', branchName: 'Button 1' }, 0, definition.id),
        ensureButtonChoiceBranch({ label: 'Button 2', targetSlideId: '', branchName: 'Button 2' }, 1, definition.id),
        ensureButtonChoiceBranch({ label: 'Button 3', targetSlideId: '', branchName: 'Button 3' }, 2, definition.id)
      ];
      registerCustomSlide(definition);
    }

    function updateButtonsSlide(slideId, question, choices = []) {
      const definition = slideDefinitions.find((slide) => slide.id === slideId);
      if (!definition) return;
      definition.title = question;
      definition.question = question;
      definition.choices = choices.map(normalizeButtonChoice).map((choice, index) => ensureButtonChoiceBranch(choice, index, slideId)).slice(0, 12);
      if (customSlides.some((slide) => slide.id === slideId)) {
        saveCustomSlides();
      }
      replaceSlideElement(slideId);
    }

    function getDroppedMediaFile(event) {
      return [...(event.dataTransfer.files || [])].find((file) => file.type.startsWith('image/') || file.type.startsWith('video/')) || null;
    }

    function hasDroppedMediaFile(event) {
      return Boolean(getDroppedMediaFile(event));
    }

    function getMediaKind(file) {
      if (file.type.startsWith('image/')) return 'media-image';
      if (file.type.startsWith('video/')) return 'media-video';
      if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) return 'media-pdf';
      return 'media-embed';
    }

    function createMediaSlide(file, insertIndex = slideOrder.length) {
      const kind = getMediaKind(file);
      const reader = new FileReader();
      reader.addEventListener('load', () => {
        const definition = {
          id: `${kind}-${Date.now()}`,
          title: file.name || 'Uploaded slide',
          kind: getMediaKind(file),
          mimeType: file.type,
          dataUrl: reader.result
        };
        try {
          registerCustomSlide(definition, insertIndex);
        } catch (error) {
          editorStatus.textContent = 'That file is too large to save in this browser. Try a smaller file.';
        }
      });
      reader.readAsDataURL(file);
    }

    function loadSlideOrder() {
      return normalizeSlideOrder(activePresentation?.slideOrder, defaultSlideOrder);
    }

    function persistSlideOrder() {
      activePresentation.slideOrder = slideOrder;
      saveActivePresentation();
      editorStatus.textContent = `Saved order for ${slideOrder.length} slides.`;
    }

    function applySlideOrder(keepCurrentSlideId = slideOrder[currentSlide]) {
      slideOrder.forEach((slideId) => {
        const slideElement = slideElementsById.get(slideId);
        if (slideElement) deck.appendChild(slideElement);
      });
      slides = slideOrder.map((slideId) => slideElementsById.get(slideId)).filter(Boolean);
      const newCurrentIndex = slideOrder.indexOf(keepCurrentSlideId);
      currentSlide = newCurrentIndex >= 0 ? newCurrentIndex : Math.max(0, Math.min(currentSlide, slides.length - 1));
      updateDeck();
    }

    function renderDropIndicators(dropIndex) {
      const indicator = document.createElement('div');
      indicator.className = 'drop-indicator';
      indicator.dataset.dropIndex = dropIndex;
      indicator.setAttribute('aria-hidden', 'true');
      indicator.setAttribute('aria-label', 'Drop image or video here to add a slide');

      indicator.addEventListener('dragover', (event) => {
        event.preventDefault();
        event.dataTransfer.dropEffect = hasDroppedMediaFile(event) ? 'copy' : 'move';
        setActiveDropIndicator(dropIndex);
      });

      indicator.addEventListener('drop', (event) => {
        event.preventDefault();
        const droppedFile = getDroppedMediaFile(event);
        if (event.dataTransfer.files?.length && droppedFile) {
          createMediaSlide(droppedFile, dropIndex);
          clearActiveDropIndicator();
          return;
        }
        const droppedSlideId = event.dataTransfer.getData('text/plain') || draggedSlideId;
        if (droppedSlideId) {
          moveSlide(droppedSlideId, dropIndex);
        }
      });

      return indicator;
    }

    function setActiveDropIndicator(dropIndex) {
      editorGrid.querySelectorAll('.drop-indicator').forEach((indicator) => {
        indicator.classList.toggle('active', Number(indicator.dataset.dropIndex) === dropIndex);
      });
    }

    function clearActiveDropIndicator() {
      editorGrid.querySelectorAll('.drop-indicator.active').forEach((indicator) => {
        indicator.classList.remove('active');
      });
    }

    function getDropIndexFromPointer(card, event, cardIndex) {
      const rect = card.getBoundingClientRect();
      const isAfterCardMidpoint = event.clientX > rect.left + rect.width / 2;
      return cardIndex + (isAfterCardMidpoint ? 1 : 0);
    }

    function renderEditorCards() {
      const hasPathways = getButtonPathways().length > 0;
      renderPathwayMap();
      editorGrid.hidden = hasPathways;
      editorGrid.innerHTML = '';
      if (hasPathways) return;
      slideOrder.forEach((slideId, index) => {
        editorGrid.appendChild(renderDropIndicators(index));
        const definition = slideDefinitions.find((slide) => slide.id === slideId);
        const card = document.createElement('article');
        card.className = 'slide-card';
        card.draggable = true;
        card.setAttribute('draggable', 'true');
        card.dataset.slideId = slideId;
        const canEdit = definition.kind === 'custom-slider' || definition.kind === 'custom-buttons';
        const canDelete = true;
        const branchStartLabels = getBranchStartLabels(slideId);
        card.classList.toggle('branch-start', branchStartLabels.length > 0);
        card.innerHTML = `
          <div class="slide-card-preview">
            ${definition.kind === 'image'
              ? `<img src="assets/slides/${definition.file}" alt="${definition.title} thumbnail" loading="lazy" decoding="async" />`
              : definition.kind === 'media-image'
                ? `<img src="${definition.dataUrl}" alt="${definition.title} thumbnail" loading="lazy" decoding="async" />`
                : definition.kind === 'media-video'
                  ? '<div class="slide-card-placeholder">Video</div>'
                  : definition.kind === 'media-pdf'
                    ? '<div class="slide-card-placeholder">PDF</div>'
                    : definition.kind === 'media-embed'
                      ? '<div class="slide-card-placeholder">File</div>'
                      : definition.kind === 'custom-slider' || definition.kind === 'custom-buttons'
                      ? `<div class="slide-card-question">${definition.question}</div>`
                      : '<div class="slide-card-placeholder">Slide</div>'}
          </div>
          ${branchStartLabels.length ? `<div class="branch-badges" aria-label="Branch starts here">${branchStartLabels.map((label) => `<span class="branch-badge">Branch starts here: ${escapeAttribute(label)}</span>`).join('')}</div>` : ''}
          ${(canEdit || canDelete) ? renderSlideOptionsMenu(slideId, canEdit) : ''}
        `;

        card.addEventListener('dragstart', (event) => {
          draggedSlideId = slideId;
          card.classList.add('dragging');
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', slideId);
        });

        card.addEventListener('dragend', () => {
          draggedSlideId = null;
          card.classList.remove('dragging');
          clearActiveDropIndicator();
        });

        card.addEventListener('dragover', (event) => {
          event.preventDefault();
          event.dataTransfer.dropEffect = hasDroppedMediaFile(event) ? 'copy' : 'move';
          setActiveDropIndicator(getDropIndexFromPointer(card, event, index));
        });

        card.addEventListener('drop', (event) => {
          event.preventDefault();
          const droppedFile = getDroppedMediaFile(event);
          if (droppedFile) {
            createMediaSlide(droppedFile, getDropIndexFromPointer(card, event, index));
            clearActiveDropIndicator();
            return;
          }
          const droppedSlideId = event.dataTransfer.getData('text/plain') || draggedSlideId;
          if (droppedSlideId) {
            moveSlide(droppedSlideId, getDropIndexFromPointer(card, event, index));
          }
        });

        attachSlideOptionsMenu(card, slideId);

        editorGrid.appendChild(card);
      });
      editorGrid.appendChild(renderDropIndicators(slideOrder.length));
    }

    function attachSlideOptionsMenu(card, slideId) {
      card.querySelector('.card-menu-button')?.addEventListener('click', (event) => {
        event.stopPropagation();
        toggleCardMenu(card);
      });
      card.querySelector('.card-menu')?.addEventListener('click', (event) => event.stopPropagation());
      card.querySelector('[data-card-action="duplicate"]')?.addEventListener('click', () => duplicateSlide(slideId));
      card.querySelector('[data-card-action="delete"]')?.addEventListener('click', () => deleteSlide(slideId));
      card.querySelector('[data-card-action="edit"]')?.addEventListener('click', () => editCustomSlide(slideId));
    }

    function toggleCardMenu(card, forceOpen) {
      const menu = card.querySelector('.card-menu');
      const button = card.querySelector('.card-menu-button');
      if (!menu || !button) return;
      document.querySelectorAll('.card-menu').forEach((otherMenu) => {
        if (otherMenu !== menu) {
          otherMenu.hidden = true;
          otherMenu.previousElementSibling?.setAttribute('aria-expanded', 'false');
        }
      });
      const shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : menu.hidden;
      menu.hidden = !shouldOpen;
      button.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
    }

    function deleteSlide(slideId) {
      slideOrder = slideOrder.filter((id) => id !== slideId);
      const customIndex = customSlides.findIndex((slide) => slide.id === slideId);
      if (customIndex >= 0) {
        customSlides.splice(customIndex, 1);
        saveCustomSlides();
      } else if (baseSlideDefinitions.some((slide) => slide.id === slideId) && !deletedSlideIds.includes(slideId)) {
        deletedSlideIds.push(slideId);
        saveDeletedSlideIds();
      }
      slideElementsById.get(slideId)?.remove();
      slideElementsById.delete(slideId);
      refreshSlideDefinitions();
      persistSlideOrder();
      renderEditorCards();
      applySlideOrder(slideOrder[Math.min(currentSlide, slideOrder.length - 1)]);
    }

    function editCustomSlide(slideId) {
      const definition = slideDefinitions.find((slide) => slide.id === slideId);
      if (!definition) return;
      if (definition.kind === 'custom-slider') {
        showToolPanel('slider');
        addSliderForm.dataset.editingSlideId = slideId;
        addSliderForm.querySelector('.tool-button').textContent = 'Save Slider';
        sliderQuestionInput.value = definition.question;
        sliderMinInput.value = definition.min;
        sliderMaxInput.value = definition.max;
        populateSliderLabelFields(definition.labels);
      }
      if (definition.kind === 'custom-buttons') {
        showToolPanel('buttons');
        addButtonsForm.dataset.editingSlideId = slideId;
        addButtonsForm.querySelector('button[type="submit"]').textContent = 'Save Button Slide';
        buttonsQuestionInput.value = definition.question;
        populateButtonChoiceFields(definition.choices || []);
      }
    }

    function editSlider(slideId) {
      editCustomSlide(slideId);
    }

    function moveSlide(slideId, targetIndex) {
      const fromIndex = slideOrder.indexOf(slideId);
      if (fromIndex < 0 || targetIndex < 0 || targetIndex > slideOrder.length || fromIndex === targetIndex) {
        return;
      }

      const adjustedTargetIndex = fromIndex < targetIndex ? targetIndex - 1 : targetIndex;
      const [movedSlide] = slideOrder.splice(fromIndex, 1);
      slideOrder.splice(adjustedTargetIndex, 0, movedSlide);
      persistSlideOrder();
      applySlideOrder(movedSlide);
      renderEditorCards();
    }

    function toggleAddMenu(forceOpen) {
      const shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : addMenu.hidden;
      addMenu.hidden = !shouldOpen;
      addMenuButton.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
    }

    function showToolPanel(tool) {
      addSliderForm.hidden = tool !== 'slider';
      addButtonsForm.hidden = tool !== 'buttons';
      addMediaForm.hidden = tool !== 'media';
      toggleAddMenu(false);
      if (tool !== 'slider') delete addSliderForm.dataset.editingSlideId;
      if (tool !== 'buttons') delete addButtonsForm.dataset.editingSlideId;
      if (tool === 'slider' && !addSliderForm.dataset.editingSlideId) {
        addSliderForm.querySelector('.tool-button').textContent = 'Add Slider';
        renderSliderLabelFields({});
      }
      if (tool === 'buttons' && !addButtonsForm.dataset.editingSlideId) {
        addButtonsForm.querySelector('button[type="submit"]').textContent = 'Add Button Slide';
        populateButtonChoiceFields(['', '', '']);
      }
      const activeForm = tool === 'slider' ? addSliderForm : tool === 'buttons' ? addButtonsForm : addMediaForm;
      activeForm.querySelector('input, select')?.focus();
    }

    function openEditor() {
      if (getRequestedPresentationId() && activePresentationId) {
        editPresentation(activePresentationId);
        return;
      }
      showManagementPage();
      renderEditorCards();
    }

    function closeEditor() {
      document.body.classList.remove('editor-open', 'library-mode', 'editing-slideshow');
      editor.setAttribute('aria-hidden', 'true');
      if (openEditorButton) {
        openEditorButton.hidden = true;
      }
      updateDeck();
    }

    function updateDeck() {
      slides.forEach((slide, index) => {
        slide.classList.toggle('active', index === currentSlide);
        slide.setAttribute('aria-hidden', index === currentSlide ? 'false' : 'true');
      });

      // Preload the next/previous slide image to keep navigation smooth.
      [currentSlide + 1, currentSlide - 1].forEach((index) => {
        const img = slides[index]?.querySelector('img');
        if (img) {
          const preload = new Image();
          preload.src = img.src;
        }
      });
    }

    function goToSlide(index) {
      currentSlide = Math.max(0, Math.min(index, slides.length - 1));
      updateDeck();
    }

    function goToSlideId(slideId) {
      const targetIndex = slideOrder.indexOf(slideId);
      if (targetIndex >= 0) goToSlide(targetIndex);
    }

    function nextSlide() { goToSlide(currentSlide + 1); }
    function prevSlide() { goToSlide(currentSlide - 1); }

    window.addEventListener('keydown', (event) => {
      if (document.body.classList.contains('editor-open')) {
        if (event.key === 'Escape') {
          event.preventDefault();
          closeEditor();
        }
        return;
      }

      if (event.key === 'ArrowRight') {
        event.preventDefault();
        nextSlide();
      }
      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        prevSlide();
      }
      if (event.key.toLowerCase() === 'e') {
        event.preventDefault();
        openEditor();
      }
    });

    async function initializePresentations() {
      const resetToken = getResetTokenFromUrl();
      if (resetToken && !currentUser) {
        showResetPasswordPanel();
        return;
      }
      if (!currentUser && !(await requireSession())) {
        return;
      }
      editorStatus.textContent = 'Loading slideshows…';
      presentations = await loadPresentations();
      if (!presentations) return;
      activePresentationId = loadActivePresentationId(presentations);
      const requestedPresentationId = getRequestedPresentationId();
      editorStatus.textContent = '';
      rebuildPresentation();
      if (requestedPresentationId && presentations.some((presentation) => presentation.id === requestedPresentationId)) {
        showPresentationPage(requestedPresentationId);
      } else {
        showManagementPage();
      }
    }

    window.addEventListener('popstate', () => {
      const requestedPresentationId = getRequestedPresentationId();
      if (requestedPresentationId && presentations.some((presentation) => presentation.id === requestedPresentationId)) {
        showPresentationPage(requestedPresentationId);
      } else {
        showManagementPage();
      }
    });

    openEditorButton?.addEventListener('click', openEditor);
    accountMenuButton?.addEventListener('click', (event) => { event.stopPropagation(); toggleAccountMenu(); });
    accountResetPasswordButton?.addEventListener('click', () => { toggleAccountMenu(false); requestPasswordReset(currentUser?.email || loginEmailInput.value); });
    teamMenuButton?.addEventListener('click', showTeamPage);
    signOutButton?.addEventListener('click', signOut);
    backToPresentationsButton?.addEventListener('click', showPresentationsPage);
    libraryTitleLink?.addEventListener('click', (event) => {
      event.preventDefault();
      navigateToPresentationsHome();
    });
    editorHomeLink?.addEventListener('click', (event) => {
      event.preventDefault();
      navigateToPresentationsHome();
    });
    inviteUserForm?.addEventListener('submit', async (event) => {
      event.preventDefault();
      await inviteUser(inviteUserEmailInput.value);
      inviteUserForm.reset();
    });
    loginForm?.addEventListener('submit', async (event) => {
      event.preventDefault();
      const loggedIn = await loginWithPassword(loginEmailInput.value, loginPasswordInput.value);
      if (loggedIn) await initializePresentations();
    });
    forgotPasswordButton?.addEventListener('click', () => requestPasswordReset(loginEmailInput.value));
    resetPasswordForm?.addEventListener('submit', async (event) => {
      event.preventDefault();
      await resetPassword(getResetTokenFromUrl(), resetPasswordInput.value);
    });
    newPresentationButton?.addEventListener('click', () => toggleCreatePresentationForm());
    addMenuButton?.addEventListener('click', () => toggleAddMenu());
    addMenuOptions.forEach((option) => {
      option.addEventListener('click', () => showToolPanel(option.dataset.tool));
    });
    createPresentationForm?.addEventListener('submit', async (event) => {
      event.preventDefault();
      await createPresentation(presentationNameInput.value);
      createPresentationForm.reset();
      toggleCreatePresentationForm(false);
    });
    [sliderMinInput, sliderMaxInput].forEach((input) => {
      input?.addEventListener('input', () => renderSliderLabelFields());
    });
    buttonChoiceCountInput?.addEventListener('input', () => renderButtonChoiceFields());
    updateButtonChoiceCountButton?.addEventListener('click', () => renderButtonChoiceFields());
    renderSliderLabelFields({});
    renderButtonChoiceFields(['', '', '']);

    document.addEventListener('click', (event) => {
      if (!addMenu.hidden && !event.target.closest('.editor-title-row')) {
        toggleAddMenu(false);
      }
      if (!event.target.closest('.slide-card') && !event.target.closest('.flow-slide-card')) {
        document.querySelectorAll('.card-menu').forEach((menu) => { menu.hidden = true; });
        document.querySelectorAll('.card-menu-button').forEach((button) => button.setAttribute('aria-expanded', 'false'));
      }
      if (!event.target.closest('.slideshow-card')) {
        presentationList.querySelectorAll('.slideshow-menu').forEach((menu) => { menu.hidden = true; });
        presentationList.querySelectorAll('.slideshow-menu-button').forEach((button) => button.setAttribute('aria-expanded', 'false'));
      }
      if (!event.target.closest('.auth-actions')) {
        toggleAccountMenu(false);
      }
    });
    addSliderForm?.addEventListener('submit', (event) => {
      event.preventDefault();
      const labels = collectSliderLabels();
      const editingSlideId = addSliderForm.dataset.editingSlideId;
      if (editingSlideId) {
        updateSliderSlide(
          editingSlideId,
          sliderQuestionInput.value.trim(),
          Number(sliderMinInput.value),
          Number(sliderMaxInput.value),
          labels
        );
        delete addSliderForm.dataset.editingSlideId;
        addSliderForm.querySelector('.tool-button').textContent = 'Add Slider';
      } else {
        createSliderSlide(
          sliderQuestionInput.value.trim(),
          Number(sliderMinInput.value),
          Number(sliderMaxInput.value),
          labels
        );
      }
      addSliderForm.reset();
      sliderMinInput.value = '1';
      sliderMaxInput.value = '5';
      renderSliderLabelFields({});
    });
    addButtonsForm?.addEventListener('submit', (event) => {
      event.preventDefault();
      const choices = collectButtonChoices();
      const editingSlideId = addButtonsForm.dataset.editingSlideId;
      if (editingSlideId) {
        updateButtonsSlide(editingSlideId, buttonsQuestionInput.value.trim() || 'Click all that apply:', choices);
        delete addButtonsForm.dataset.editingSlideId;
        addButtonsForm.querySelector('button[type="submit"]').textContent = 'Add Button Slide';
      } else {
        createButtonsSlide(buttonsQuestionInput.value.trim() || 'Click all that apply:', choices);
      }
      addButtonsForm.reset();
      buttonChoiceCountInput.value = '3';
      renderButtonChoiceFields(['', '', '']);
      addButtonsForm.hidden = true;
    });
    addMediaForm?.addEventListener('submit', (event) => {
      event.preventDefault();
      const file = mediaFileInput.files?.[0];
      if (!file) return;
      createMediaSlide(file);
      addMediaForm.reset();
    });

    initializePresentations();
  </script>
</body>
</html>
